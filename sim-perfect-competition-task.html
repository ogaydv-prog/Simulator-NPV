<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анализ Совершенной Конкуренции | Практикум</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0b1121; color: #f8fafc; overflow-x: hidden; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        
        /* Стилизация винтажного ползунка */
        input[type="range"] { -webkit-appearance: none; width: 100%; background: #0f172a; height: 12px; border-radius: 6px; border: 1px solid #334155; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 24px; height: 32px; background: #3b82f6; border-radius: 4px; cursor: pointer; border: 2px solid #1e293b; box-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
        
        .scenario-btn { transition: all 0.2s; }
        .scenario-btn.active { box-shadow: 0 0 0 2px #fff; transform: scale(1.02); }
    </style>
</head>
<body class="p-4 md:p-8">

<div class="max-w-7xl mx-auto space-y-6">
    <header class="flex flex-col md:flex-row justify-between items-start md:items-end gap-4 border-b border-slate-800 pb-6">
        <div>
            <h1 class="text-3xl md:text-4xl font-black text-white tracking-tight">Совершенная конкуренция</h1>
            <p class="text-blue-400 font-bold uppercase tracking-widest text-xs mt-2">Практическое занятие</p>
        </div>
        <div class="flex gap-2">
            <button onclick="setScenario(131)" id="btn-131" class="scenario-btn bg-emerald-600 hover:bg-emerald-500 text-white px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 active">
                <i data-lucide="trending-up" class="w-4 h-4"></i> P = $131 (Рост)
            </button>
            <button onclick="setScenario(81)" id="btn-81" class="scenario-btn bg-amber-600 hover:bg-amber-500 text-white px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2">
                <i data-lucide="minus-circle" class="w-4 h-4"></i> P = $81 (Спад)
            </button>
            <button onclick="setScenario(71)" id="btn-71" class="scenario-btn bg-rose-600 hover:bg-rose-500 text-white px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2">
                <i data-lucide="power-off" class="w-4 h-4"></i> P = $71 (Кризис)
            </button>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <div class="lg:col-span-5 space-y-6">
            
            <!-- Слайдер объема -->
            <div class="glass-panel p-6 rounded-2xl">
                <div class="flex justify-between items-center mb-4">
                    <label class="text-sm font-bold text-slate-300 uppercase tracking-wider">Объем выпуска (Q)</label>
                    <span id="val-q" class="text-2xl font-black text-blue-400 bg-blue-500/10 px-3 py-1 rounded-lg">0 ед.</span>
                </div>
                <input type="range" id="slider-q" min="0" max="10" value="0" step="1">
                <div class="flex justify-between text-xs text-slate-500 mt-2 font-mono">
                    <span>0</span><span>2</span><span>4</span><span>6</span><span>8</span><span>10</span>
                </div>
            </div>

            <!-- Блоки данных -->
            <div class="grid grid-cols-2 gap-4">
                <div class="glass-panel p-4 rounded-2xl border-l-4 border-blue-500">
                    <span class="text-[10px] uppercase font-bold text-slate-400 block mb-1">Выручка (TR)</span>
                    <span id="val-tr" class="text-xl font-mono font-bold text-white">$0</span>
                    <div class="text-xs text-slate-500 mt-1">P * Q</div>
                </div>
                <div class="glass-panel p-4 rounded-2xl border-l-4 border-rose-500">
                    <span class="text-[10px] uppercase font-bold text-slate-400 block mb-1">Общие издержки (TC)</span>
                    <span id="val-tc" class="text-xl font-mono font-bold text-white">$100</span>
                    <div class="text-xs text-slate-500 mt-1">TFC ($100) + TVC</div>
                </div>
                <div class="glass-panel p-4 rounded-2xl border-l-4 border-emerald-500">
                    <span class="text-[10px] uppercase font-bold text-slate-400 block mb-1">Предельная выручка (MR)</span>
                    <span id="val-mr" class="text-xl font-mono font-bold text-emerald-400">-</span>
                    <div class="text-xs text-slate-500 mt-1">Равна цене (P)</div>
                </div>
                <div class="glass-panel p-4 rounded-2xl border-l-4 border-amber-500">
                    <span class="text-[10px] uppercase font-bold text-slate-400 block mb-1">Предельные издержки (MC)</span>
                    <span id="val-mc" class="text-xl font-mono font-bold text-amber-400">-</span>
                    <div class="text-xs text-slate-500 mt-1">Зависит от Q</div>
                </div>
            </div>

            <!-- Итоговая прибыль и Вердикт -->
            <div id="profit-panel" class="glass-panel p-6 rounded-2xl border border-slate-700 transition-colors duration-300 border-emerald-500">
                <div class="flex justify-between items-end mb-4">
                    <span class="text-sm font-bold text-slate-300 uppercase tracking-wider">Экономическая прибыль</span>
                    <span id="val-profit" class="text-4xl font-black font-mono" style="color: rgb(16, 185, 129);">$-100</span>
                </div>
                <div class="h-px w-full bg-slate-700 my-4"></div>
                <h4 class="text-xs font-bold uppercase text-slate-400 mb-2 flex items-center gap-2">
                    <i data-lucide="info" class="w-4 h-4"></i> Управленческий анализ
                </h4>
                <p id="val-verdict" class="text-sm text-slate-300 leading-relaxed">Инициализация...</p>
            </div>
        </div>

        <div class="lg:col-span-7 space-y-6">
            <div class="glass-panel p-4 rounded-2xl h-[280px] relative">
                <canvas id="trTcChart"></canvas>
            </div>
            <div class="glass-panel p-4 rounded-2xl h-[280px] relative">
                <canvas id="mrMcChart"></canvas>
            </div>
        </div>

    </div>
</div>

<script>
    lucide.createIcons();

    // Точные данные из таблицы (TFC = $100)
    const tableData = [
        { q: 0, tvc: 0, tc: 100, mc: null, avc: null, atc: null },
        { q: 1, tvc: 90, tc: 190, mc: 90, avc: 90.00, atc: 190.00 },
        { q: 2, tvc: 170, tc: 270, mc: 80, avc: 85.00, atc: 135.00 },
        { q: 3, tvc: 240, tc: 340, mc: 70, avc: 80.00, atc: 113.33 },
        { q: 4, tvc: 300, tc: 400, mc: 60, avc: 75.00, atc: 100.00 },
        { q: 5, tvc: 370, tc: 470, mc: 70, avc: 74.00, atc: 94.00 },
        { q: 6, tvc: 450, tc: 550, mc: 80, avc: 75.00, atc: 91.67 },
        { q: 7, tvc: 540, tc: 640, mc: 90, avc: 77.14, atc: 91.43 },
        { q: 8, tvc: 650, tc: 750, mc: 110, avc: 81.25, atc: 93.75 },
        { q: 9, tvc: 780, tc: 880, mc: 130, avc: 86.67, atc: 97.78 },
        { q: 10, tvc: 930, tc: 1030, mc: 150, avc: 93.00, atc: 103.00 }
    ];

    let currentPrice = 131;
    let trTcChartInst = null;
    let mrMcChartInst = null;

    // Плагин для отрисовки проекций и зон на верхнем графике TR/TC
    const trTcPlugin = {
        id: 'trTcProjection',
        afterDraw: (chart) => {
            const q = parseInt(document.getElementById('slider-q').value);
            const { ctx, chartArea: { top, bottom }, scales: { x, y } } = chart;
            
            const xPos = x.getPixelForValue(q);
            const trVal = q * currentPrice;
            const tcVal = tableData[q].tc;
            
            const trY = y.getPixelForValue(trVal);
            const tcY = y.getPixelForValue(tcVal);

            ctx.save();
            
            // 1. Рисуем пунктирную проекцию по оси Y
            ctx.beginPath();
            ctx.moveTo(xPos, bottom);
            ctx.lineTo(xPos, top);
            ctx.lineWidth = 2;
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.setLineDash([5, 5]);
            ctx.stroke();

            // 2. Рисуем зону прибыли/убытка (Gap)
            if (q > 0) {
                const isProfit = trVal >= tcVal;
                // Закрашиваем прямоугольник между линией выручки и издержек
                ctx.fillStyle = isProfit ? 'rgba(16, 185, 129, 0.4)' : 'rgba(244, 63, 94, 0.4)';
                // Рисуем колонку-индикатор на ширину 20px вокруг текущего Q
                ctx.fillRect(xPos - 10, Math.min(trY, tcY), 20, Math.abs(trY - tcY));
                
                // Добавляем обводку для четкости
                ctx.strokeStyle = isProfit ? '#10b981' : '#f43f5e';
                ctx.setLineDash([]);
                ctx.lineWidth = 1;
                ctx.strokeRect(xPos - 10, Math.min(trY, tcY), 20, Math.abs(trY - tcY));
            }
            
            ctx.restore();
        }
    };

    // Плагин для отрисовки проекций на нижнем графике MR/MC
    const mrMcPlugin = {
        id: 'mrMcProjection',
        afterDraw: (chart) => {
            const q = parseInt(document.getElementById('slider-q').value);
            const { ctx, chartArea: { top, bottom }, scales: { x, y } } = chart;
            
            const xPos = x.getPixelForValue(q);
            
            ctx.save();
            // Пунктирная проекция
            ctx.beginPath();
            ctx.moveTo(xPos, bottom);
            ctx.lineTo(xPos, top);
            ctx.lineWidth = 2;
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.setLineDash([5, 5]);
            ctx.stroke();
            
            // Подсветка точки P=MR
            const mrY = y.getPixelForValue(currentPrice);
            ctx.fillStyle = '#10b981';
            ctx.beginPath();
            ctx.arc(xPos, mrY, 5, 0, Math.PI * 2);
            ctx.fill();
            
            // Подсветка точки MC
            if(q > 0) {
                const mcY = y.getPixelForValue(tableData[q].mc);
                ctx.fillStyle = '#f59e0b';
                ctx.beginPath();
                ctx.arc(xPos, mcY, 5, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();
        }
    };

    function initCharts() {
        Chart.defaults.color = '#94a3b8';
        Chart.defaults.font.family = 'Inter';

        const ctx1 = document.getElementById('trTcChart').getContext('2d');
        trTcChartInst = new Chart(ctx1, {
            type: 'line',
            data: {
                labels: tableData.map(d => d.q),
                datasets: [
                    { label: 'Total Revenue (TR)', data: [], borderColor: '#3b82f6', backgroundColor: '#3b82f6', tension: 0.1, borderWidth: 3 },
                    { label: 'Total Cost (TC)', data: tableData.map(d => d.tc), borderColor: '#f43f5e', backgroundColor: '#f43f5e', tension: 0.4, borderWidth: 3 }
                ]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { title: { display: true, text: 'Анализ Общих Показателей (TR - TC)', color: '#fff' } },
                scales: { y: { beginAtZero: true, grid: { color: '#1e293b' } }, x: { grid: { color: '#1e293b' } } },
                animation: { duration: 200 } // Быстрая анимация для плавности ползунка
            },
            plugins: [trTcPlugin]
        });

        const ctx2 = document.getElementById('mrMcChart').getContext('2d');
        mrMcChartInst = new Chart(ctx2, {
            type: 'line',
            data: {
                labels: tableData.map(d => d.q),
                datasets: [
                    { label: 'Marginal Revenue (MR=P)', data: [], borderColor: '#10b981', borderDash: [5, 5], tension: 0, borderWidth: 2 },
                    { label: 'Marginal Cost (MC)', data: tableData.map(d => d.mc), borderColor: '#f59e0b', tension: 0.4, borderWidth: 3 },
                    { label: 'Average Variable Cost (AVC)', data: tableData.map(d => d.avc), borderColor: '#a855f7', tension: 0.4, borderWidth: 2 }
                ]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { title: { display: true, text: 'Анализ Предельных Показателей (MR - MC)', color: '#fff' } },
                scales: { y: { min: 40, max: 200, grid: { color: '#1e293b' } }, x: { grid: { color: '#1e293b' } } },
                animation: { duration: 200 }
            },
            plugins: [mrMcPlugin]
        });
    }

    function setScenario(price) {
        currentPrice = price;
        
        // Обновление кнопок
        document.querySelectorAll('.scenario-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`btn-${price}`).classList.add('active');

        // Обновление данных графиков
        const trData = tableData.map(d => d.q * price);
        const mrData = tableData.map(d => price);
        
        trTcChartInst.data.datasets[0].data = trData;
        trTcChartInst.update();
        
        mrMcChartInst.data.datasets[0].data = mrData;
        mrMcChartInst.update();

        // Умный сброс слайдера для демо
        const slider = document.getElementById('slider-q');
        if(price === 131) slider.value = 9;
        if(price === 81) slider.value = 6;
        if(price === 71) slider.value = 0;
        
        updateDashboard();
    }

    function updateDashboard() {
        const q = parseInt(document.getElementById('slider-q').value);
        const data = tableData[q];
        
        const tr = q * currentPrice;
        const profit = tr - data.tc;

        // Обновление значений в панелях
        document.getElementById('val-q').innerText = `${q} ед.`;
        document.getElementById('val-tr').innerText = `$${tr}`;
        document.getElementById('val-tc').innerText = `$${data.tc}`;
        document.getElementById('val-mr').innerText = q === 0 ? '-' : `$${currentPrice}`;
        document.getElementById('val-mc').innerText = data.mc ? `$${data.mc}` : '-';

        const profitEl = document.getElementById('val-profit');
        const panelEl = document.getElementById('profit-panel');
        
        profitEl.innerText = (profit > 0 ? '+' : '') + `$${profit}`;

        // Принудительная перерисовка графиков для отображения проекций
        trTcChartInst.update('none'); // 'none' отключает анимацию при движении ползунка для мгновенного отклика
        mrMcChartInst.update('none');

        // Логика Вердикта
        let verdict = "";
        panelEl.classList.remove('border-emerald-500', 'border-rose-500', 'border-amber-500', 'bg-emerald-900/20', 'bg-rose-900/20', 'bg-amber-900/20');

        if (currentPrice === 131) {
            if (q === 9) {
                verdict = `<strong>Идеально! Точка максимизации прибыли.</strong> Вы производите до точки, где MR ($131) максимально близко к MC ($130), не превышая его. Ваша экономическая прибыль максимальна ($299). Производство 10-й единицы принесет убыток на марже (MC $150 > MR $131).`;
                panelEl.classList.add('border-emerald-500', 'bg-emerald-900/20');
                profitEl.style.color = '#10b981';
            } else if (q < 9) {
                // ПРОВЕРКА НА ОТРИЦАТЕЛЬНУЮ ПРИБЫЛЬ В РЕЖИМЕ 131
                if (profit < 0) {
                    verdict = `Вы пока в убытке (Q слишком мал, чтобы покрыть постоянные издержки). Но MR ($131) выше MC, поэтому <strong>смело увеличивайте объем!</strong>`;
                    panelEl.classList.add('border-rose-500');
                    profitEl.style.color = '#f43f5e'; // Красный цвет
                } else {
                    verdict = `Вы получаете прибыль, но <strong>недопроизводите</strong>. Каждая следующая единица до Q=9 приносит дополнительную прибыль, так как предельная выручка (MR=$131) выше предельных издержек (MC). Увеличьте объем!`;
                    panelEl.classList.add('border-emerald-500');
                    profitEl.style.color = '#10b981'; // Изумрудный цвет
                }
            } else {
                verdict = `<strong>Перепроизводство.</strong> Производство 10-й единицы обошлось вам в $150 (MC), а продали вы ее за $131. Прибыль начала падать. Снизьте выпуск до Q=9.`;
                panelEl.classList.add('border-amber-500');
                profitEl.style.color = '#10b981';
            }
        } 
        else if (currentPrice === 81) {
            if (q === 6) {
                verdict = `<strong>Минимизация убытков (Loss Minimization).</strong> Да, вы теряете $64. Но это правильное управленческое решение! Если бы вы закрылись (Q=0), вы бы потеряли фиксированные издержки TFC = $100. При Q=6 вы полностью покрываете сырье (AVC=$75 < P=$81) и частично оплачиваете аренду.`;
                panelEl.classList.add('border-amber-500', 'bg-amber-900/20');
                profitEl.style.color = '#f59e0b';
            } else if (q === 0) {
                verdict = `Вы остановили производство и потеряли $100 (TFC). <strong>Ошибка:</strong> при цене $81 вы могли бы покрыть сырье (AVC) и заработать немного "маржинальной прибыли" для оплаты аренды, сократив убыток до $64 при Q=6.`;
                panelEl.classList.add('border-rose-500');
                profitEl.style.color = '#f43f5e';
            } else {
                verdict = `Вы терпите убытки. Оптимальная стратегия выживания в этом кризисе — производить Q=6, где MR=MC, чтобы минимизировать потери до $64.`;
                panelEl.classList.add('border-amber-500');
                profitEl.style.color = '#f59e0b';
            }
        }
        else if (currentPrice === 71) {
            if (q === 0) {
                verdict = `<strong>Правильное решение: Точка закрытия (Shutdown).</strong> Цена $71 упала ниже минимальных средних переменных издержек (min AVC = $74). Выручка не покрывает даже закупку сырья. Выгоднее просто платить аренду ($100), чем производить и увеличивать долги.`;
                panelEl.classList.add('border-rose-500', 'bg-rose-900/20');
                profitEl.style.color = '#f43f5e';
            } else {
                verdict = `<strong>Критическая ошибка!</strong> Вы теряете $124. Ваша цена продажи ($71) меньше себестоимости сырья (AVC=$74 при Q=6). Вы доплачиваете клиентам за то, чтобы они забирали ваш товар. Немедленно остановите станки (Q=0)!`;
                panelEl.classList.add('border-rose-500');
                profitEl.style.color = '#f43f5e';
            }
        }

        document.getElementById('val-verdict').innerHTML = verdict;
    }

    // Привязываем функцию к слайдеру
    document.getElementById('slider-q').addEventListener('input', updateDashboard);

    // Первоначальный запуск
    initCharts();
    setScenario(131);

</script>

</body>
</html>
