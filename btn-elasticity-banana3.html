<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Запуск симулятора эластичности</title>
    <!-- Подключаем Tailwind CSS для анимаций и стилей -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Мягкое неоновое свечение в стиле вашего экономического терминала */
        .neon-glow:hover {
            box-shadow: 0 0 15px rgba(0, 255, 208, 0.35);
        }
    </style>
</head>
<body class="bg-[#0d1117] flex items-center justify-center min-h-screen p-4">

    <!-- Ссылка-контейнер: ведет на ваш симулятор в GitHub Pages -->
    <a href="https://ogaydv-prog.github.io/Simulator-NPV/sim-elasticity-banana3.html" 
       target="_blank" 
       class="neon-glow block max-w-sm w-full bg-[#161b22] border border-[#22303c] rounded-xl p-4 text-center transition-all duration-300 transform hover:scale-[1.05] hover:border-[#00ffd0] active:scale-[0.98] group cursor-pointer shadow-lg">
        
        <!-- Блок Иконки с анимацией -->
        <div class="relative w-full h-36 bg-[#1f2630] rounded-lg overflow-hidden flex items-center justify-center border border-[#2d3744] mb-3 transition-colors group-hover:border-[#00ffd0]/30">
            <!-- Сама картинка, которую вы загрузили на GitHub -->
            <img src="pic-sim-demand-analysis-1-1.png" 
                 alt="Анализ спроса и эластичности" 
                 class="max-w-full max-h-full object-contain p-2 transition-transform duration-300 group-hover:scale-105"
                 id="launcherIcon"
                 onerror="handleImageError()">
        </div>

        <!-- Текстовое описание под кнопкой -->
        <div class="text-left px-1">
            <span class="text-[10px] text-[#00ffd0] font-bold uppercase tracking-wider block mb-0.5">Интерактивный симулятор</span>
            <h3 class="text-sm font-bold text-white group-hover:text-[#00ffd0] transition-colors duration-200 leading-snug">
                Эластичность спроса (Бананы)
            </h3>
            <p class="text-[11px] text-[#8b949e] mt-1 leading-relaxed">
                Анализ точечной эластичности, ценовых изменений и динамики выручки TR в реальном времени.
            </p>
        </div>

        <!-- Кнопка действия (внутренняя визуализация) -->
        <div class="mt-4 w-full py-2 bg-[#232a34] group-hover:bg-[#00ffd0] text-[#aeb7c2] group-hover:text-black font-bold text-xs rounded-lg transition-all duration-300 uppercase tracking-wider flex items-center justify-center gap-1">
            <span>Открыть терминал</span>
            <span class="transform transition-transform group-hover:translate-x-1">→</span>
        </div>
    </a>

    <script>
        // Резервный план: если картинка на GitHub ещё не обновилась, показываем стильную заглушку
        function handleImageError() {
            const imgContainer = document.getElementById('launcherIcon').parentElement;
            imgContainer.innerHTML = `
                <div class="flex flex-col items-center justify-center text-[#00ffd0] opacity-80">
                    <span class="text-4xl mb-1">📊</span>
                    <span class="text-[10px] uppercase font-bold tracking-widest text-[#8b949e]">pic-sim-demand</span>
                </div>
            `;
        }
    </script>

</body>
</html>
