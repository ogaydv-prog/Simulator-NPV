<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель запуска симулятора</title>
    <!-- Подключаем Tailwind CSS для превосходного визуального дизайна -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0d1117;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        /* Анимированный неоновый импульс на фоне для создания глубины */
        .glow-effect {
            box-shadow: 0 0 20px rgba(0, 255, 208, 0.1);
            transition: box-shadow 0.4s ease, border-color 0.4s ease;
        }
        .glow-effect:hover {
            box-shadow: 0 0 35px rgba(0, 255, 208, 0.25), 0 0 10px rgba(0, 82, 255, 0.15);
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6 text-white">

    <!-- Ссылка-контейнер, ведущая на симулятор при нажатии -->
    <a href="sim-elasticity-banana3.html" 
       class="group glow-effect relative block w-full max-w-[340px] bg-[#161b22] border border-[#22303c] hover:border-[#00ffd0] rounded-2xl p-6 text-center transition-all duration-300 ease-out hover:scale-[1.05] active:scale-[0.98] shadow-xl">
        
        <!-- Внутренний контейнер для иконки с градиентным свечением -->
        <div class="relative mx-auto w-32 h-32 mb-4 flex items-center justify-center rounded-xl bg-[#0d1117] p-2 border border-[#22303c] group-hover:border-[#00ffd0]/50 transition-colors duration-300 overflow-hidden">
            
            <!-- Задний светящийся фон иконки при наведении -->
            <div class="absolute inset-0 bg-gradient-to-tr from-[#00ffd0]/0 to-[#0052ff]/0 group-hover:from-[#00ffd0]/10 group-hover:to-[#0052ff]/10 transition-all duration-300"></div>
            
            <!-- Ваша иконка с GitHub (с прописанным локальным/относительным путем и резервным вариантом) -->
            <img src="pic-sim-demand-analysis-1-1.png" 
                 alt="Анализ Спроса" 
                 class="relative z-10 w-full h-full object-contain transition-transform duration-300 group-hover:scale-[1.08]"
                 onerror="this.onerror=null; this.src='https://placehold.co/120x120/161b22/00ffd0?text=Demand+Analysis&font=playfair';">
        </div>

        <!-- Текстовое описание запускаемого модуля -->
        <div class="space-y-1">
            <span class="text-[9px] text-[#00ffd0] uppercase font-bold tracking-widest bg-[#1f2630] px-2.5 py-0.5 rounded-full border border-[#00ffd0]/20">
                Запустить модуль
            </span>
            <h2 class="text-base font-bold text-white group-hover:text-[#00ffd0] transition-colors duration-300 pt-2">
                Анализ эластичности спроса
            </h2>
            <p class="text-[11px] text-[#9aa4b2]">
                Симулятор ценовых решений • МВА-В26-МД
            </p>
        </div>

        <!-- Декоративная стрелочка-указатель в правом верхнем углу -->
        <div class="absolute top-4 right-4 text-gray-600 group-hover:text-[#00ffd0] transition-colors duration-300">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 transform group-hover:translate-x-0.5 group-hover:-translate-y-0.5 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
            </svg>
        </div>
    </a>

    <!-- Легкое брендирование под лаунчером -->
    <div class="mt-6 text-[10px] text-[#8b949e] uppercase tracking-wider">
        Управленческая экономика • AlmaU • 2026
    </div>

</body>
</html>
