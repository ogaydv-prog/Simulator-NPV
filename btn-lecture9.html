<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>btn-lecture9</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
    height: 100vh;
  }

  /* 3D Контейнер */
  .flip-card {
    background-color: transparent;
    width: 220px;
    height: 220px;
    perspective: 1000px;
    cursor: pointer;
  }

  .flip-card-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    transform-style: preserve-3d;
  }

  /* Переворот */
  .flip-card.flipped .flip-card-inner {
    transform: rotateY(180deg);
  }

  .flip-card-front, .flip-card-back {
    position: absolute;
    width: 100%;
    height: 100%;
    -webkit-backface-visibility: hidden;
    backface-visibility: hidden;
    border-radius: 12px;
    overflow: hidden;
    box-sizing: border-box;
  }

  /* ЛИЦЕВАЯ СТОРОНА */
  .flip-card-front {
    background-color: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.25s ease, filter 0.25s ease;
  }

  .flip-card:not(.flipped):hover .flip-card-front {
    transform: scale(1.05);
    filter: drop-shadow(0 0 12px rgba(13, 148, 136, 0.6));
  }

  .tile-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* ОБРАТНАЯ СТОРОНА: Ссылка на gre.html */
  .flip-card-back {
    background-color: #0f172a;
    transform: rotateY(180deg);
    border: 2px solid rgba(13, 148, 136, 0.7);
    padding: 12px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 15px;
  }

  .lecture-link {
    display: block;
    background: rgba(13, 148, 136, 0.2);
    color: #ffffff;
    text-decoration: none;
    padding: 15px 20px;
    border-radius: 8px;
    font-size: 14px;
    font-family: 'Segoe UI', Arial, sans-serif;
    text-align: center;
    border: 1px solid #14b8a6;
    transition: all 0.2s ease;
    font-weight: bold;
  }

  .lecture-link:hover {
    background: rgba(13, 148, 136, 0.4);
    transform: scale(1.05);
  }
</style>
</head>
<body>

<div class="flip-card" id="card" onclick="this.classList.toggle('flipped')">
  <div class="flip-card-inner">
    
    <div class="flip-card-front">
      <img src="https://raw.githubusercontent.com/ogaydv-prog/Simulator-NPV/main/pic-lecture9.png" class="tile-img" alt="Лекция 9">
    </div>

    <div class="flip-card-back">
      <a href="gre.html" target="_blank" class="lecture-link">
        Открыть лекцию<br>ГРЭ
      </a>
    </div>

  </div>
</div>

</body>
</html>
