<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background: transparent; 
        }
        .btn-link { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            width: 100%; 
            height: 100%; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            text-decoration: none;
            border-radius: 12px;
            overflow: hidden;
        }
        .btn-link:hover { 
            transform: scale(1.08); 
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.5));
        }
        .btn-img { 
            max-width: 95%; 
            max-height: 95%; 
            object-fit: contain; 
        }
    </style>
</head>
<body>
    <a href="https://docs.google.com/presentation/d/1stX-mkcUYBy6hNQXsNonOZbKO6YZj51F/edit?usp=drive_link&ouid=109725301150629205728&rtpof=true&sd=true" 
       target="_blank" 
       class="btn-link">
        <img src="https://raw.githubusercontent.com/ogaydv-prog/Simulator-NPV/main/pic-preza9.png" 
             alt="Презентация: Государственное регулирование экономики" 
             class="btn-img">
    </a>
</body>
</html>
