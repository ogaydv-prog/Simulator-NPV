<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Статьи: Типы конкуренции</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Идеальная центровка: растягиваем на 100% фрейма */
        html, body { 
            margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; 
            height: 100vh; background: transparent; overflow: hidden; 
        }
        
        /* Пружинящая кнопка */
        .btn-link { 
            display: block; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.3s ease; 
            cursor: pointer; line-height: 0; width: 100%; height: auto;
        }
        .btn-link:hover { 
            transform: scale(1.05); 
            filter: brightness(1.2) drop-shadow(0 0 10px rgba(56, 189, 248, 0.65)); 
        }
        .btn-link:active { transform: scale(0.98); }
        .btn-img { display: block; width: 100%; height: auto; border-radius: 12px; }

        /* Внутренний оверлей со статьями */
        .article-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 17, 33, 0.98); backdrop-filter: blur(12px);
            border: 2px solid rgba(59, 130, 246, 0.4); border-radius: 12px;
            display: flex; flex-direction: column; padding: 12px; box-sizing: border-box;
            opacity: 0; pointer-events: none; transition: opacity 0.25s ease, transform 0.25s ease;
            transform: scale(0.95); z-index: 10;
        }
        .article-overlay.active { opacity: 1; pointer-events: auto; transform: scale(1); }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 2px; }
    </style>
</head>
<body>

    <div class="relative w-full max-w-[250px] aspect-square flex justify-center items-center select-none">
        <div id="main-button" onclick="showArticles()" class="btn-link">
            <img src="pic-articles5.png" alt="Полезные статьи" class="btn-img">
        </div>

        <div id="article-menu" class="article-overlay font-sans text-white">
            <div class="flex justify-between items-center mb-2 border-b border-slate-800 pb-2">
                <span class="text-[9px] uppercase font-black tracking-wider text-blue-400">Статьи по теме</span>
                <button onclick="hideArticles(event)" class="text-slate-400 hover:text-white text-xs font-bold cursor-pointer">✕</button>
            </div>
            
            <div class="flex-grow overflow-y-auto custom-scroll pr-1 space-y-2">
                <a href="https://alataucitybank.kz/business/osim/articles/chto-proiskhodilo-na-kofeynom-rynke-v-2025-godu" target="_blank" class="block p-2 rounded-lg bg-blue-600/10 hover:bg-blue-600/20 border border-blue-500/20 transition-all text-[11px] leading-tight">
                    <span class="text-blue-500 font-bold block mb-0.5">Кофейный рынок 2025</span>
                    <span class="text-slate-300">Анализ конкурентной среды</span>
                </a>
                <a href="https://azh.kz/ru/news/view/114571" target="_blank" class="block p-2 rounded-lg bg-blue-600/10 hover:bg-blue-600/20 border border-blue-500/20 transition-all text-[11px] leading-tight">
                    <span class="text-blue-500 font-bold block mb-0.5">Новости Атырау</span>
                    <span class="text-slate-300">Локальный рынок и цены</span>
                </a>
                <a href="https://tebiz.ru/mi/analiz-rynka-kofe-v-kazakhstane" target="_blank" class="block p-2 rounded-lg bg-blue-600/10 hover:bg-blue-600/20 border border-blue-500/20 transition-all text-[11px] leading-tight">
                    <span class="text-blue-500 font-bold block mb-0.5">Анализ рынка кофе (РК)</span>
                    <span class="text-slate-300">Отраслевой отчет Tebiz</span>
                </a>
            </div>
        </div>
    </div>

    <script>
        function showArticles() { document.getElementById('article-menu').classList.add('active'); }
        function hideArticles(event) { event.stopPropagation(); document.getElementById('article-menu').classList.remove('active'); }
    </script>
</body>
</html>
