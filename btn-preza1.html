<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  
  .main-tile-btn {
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
    display: inline-block;
    transition: transform 0.25s cubic-bezier(0.25, 0.8, 0.25, 1), filter 0.25s ease;
    outline: none;
    -webkit-tap-highlight-color: transparent;
  }
  
  /* Эффект увеличения и мягкого голубого свечения при наведении */
  .main-tile-btn:hover {
    transform: scale(1.05);
    filter: drop-shadow(0 10px 20px rgba(0,0,0,0.15)) drop-shadow(0 0 12px rgba(144, 202, 249, 0.65));
  }
  
  .main-tile-btn:active {
    transform: scale(0.98);
  }
  
  .tile-img {
    width: 100%;
    max-width: 250px; /* Идеальный размер плитки, совпадающий с остальными кнопками */
    height: auto;
    display: block;
    border-radius: 12px;
  }
</style>
</head>
<body>

  <button id="btn-preza" class="main-tile-btn">
    <img src="pic-preza1.png" class="tile-img" alt="Презентация: Фундаментальные принципы">
  </button>

<script>
  document.getElementById("btn-preza").addEventListener("click", function() {
    // Надежный переход на ваш файл презентации на Google Диске
    window.open("https://drive.google.com/file/d/1rtBj0oOYSqWazy7Bo1GUPS1GwWH9MeGU/view?usp=drive_link", "_blank");
  });
</script>

</body>
</html>
