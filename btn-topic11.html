<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background: transparent; 
            overflow: hidden; 
        }
        .btn-link { 
            display: block; 
            width: 100%; 
            height: 100%;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.3s ease; 
            cursor: pointer; 
            text-decoration: none;
        }
        /* Эффект при наведении: увеличение и неоновая подсветка */
        .btn-link:hover { 
            transform: scale(1.05); 
            filter: brightness(1.15) drop-shadow(0 0 15px rgba(255, 255, 255, 0.4)); 
        }
        /* Эффект нажатия */
        .btn-link:active { 
            transform: scale(0.98); 
        }
        .btn-img { 
            display: block; 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
        }
    </style>
</head>
<body>

    <!-- Ссылка на ваш дашборд sim-economy-info.html -->
    <a href="sim-economy-info.html" 
       target="_blank" 
       rel="noopener noreferrer"
       class="btn-link">
        <!-- Картинка 11-й темы из вашего репозитория -->
        <img src="https://raw.githubusercontent.com/ogaydv-prog/Simulator-NPV/main/pic-topic11.png" 
             class="btn-img" 
             alt="Тема 11: Экономическая информация">
    </a>

</body>
</html>
