<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  
  /* Фирменная пружинящая кнопка — теперь полностью отзывчивая */
  .main-tile-btn {
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
    display: inline-block;
    transition: transform 0.25s cubic-bezier(0.25, 0.8, 0.25, 1), filter 0.25s ease;
    outline: none;
    -webkit-tap-highlight-color: transparent;
    width: 100%;
    max-width: 250px; /* Идеальный размер плитки, совпадающий со всеми остальными */
    height: auto;
  }
  
  /* Эффект увеличения и мягкого голубого свечения при наведении */
  .main-tile-btn:hover {
    transform: scale(1.05);
    filter: drop-shadow(0 10px 20px rgba(0,0,0,0.15)) drop-shadow(0 0 12px rgba(144, 202, 249, 0.65));
  }
  
  .main-tile-btn:active {
    transform: scale(0.98);
  }
  
  .tile-img {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 12px;
  }
</style>
</head>
<body>

  <button id="btn-fundamental" class="main-tile-btn">
    <!-- Использование абсолютного URL-адреса картинки на вашем GitHub для 100% надежности -->
    <img src="https://ogaydv-prog.github.io/Simulator-NPV/pic-fundamental-principles.png" class="tile-img" alt="Фундаментальные принципы управленческой экономики" onerror="this.src='https://placehold.co/250x250/1e293b/ffffff?text=Ошибка+картинки'">
  </button>

<script>
  document.getElementById("btn-fundamental").addEventListener("click", function() {
    // Точный новый адрес вашей страницы внутри папки "Занятия"
    const targetUrl = "https://sites.google.com/view/managerial-economics-mba/%D0%B7%D0%B0%D0%BD%D1%8F%D1%82%D0%B8%D1%8F/%D1%84%D1%83%D0%BD%D0%B4%D0%B0%D0%BC%D0%B5%D0%BD%D1%82%D0%B0%D0%BB%D1%8C%D0%BD%D1%8B%D0%B5-%D0%BF%D1%80%D0%B8%D0%BD%D1%86%D0%B8%D0%BF%D1%8B-%D1%83%D0%BF%D1%80%D0%B0%D0%B2%D0%BB%D0%B5%D0%BD%D1%87%D0%B5%D1%81%D0%BA%D0%BE%D0%B9-%D1%8D%D0%BA%D0%BE%D0%BD%D0%BE%D0%BC%D0%B8%D0%BA%D0%B8";
    
    window.open(targetUrl, "_blank");
  });
</script>

</body>
</html>
