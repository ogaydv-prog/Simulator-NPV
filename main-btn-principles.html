<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<style>
  body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  .main-tile {
    display: inline-block;
    cursor: pointer;
    transition: transform 0.25s cubic-bezier(0.25, 0.8, 0.25, 1), filter 0.25s ease;
  }
  .main-tile:hover {
    transform: scale(1.05);
    filter: drop-shadow(0 10px 20px rgba(0,0,0,0.15)) drop-shadow(0 0 10px rgba(76, 175, 80, 0.5));
  }
  .main-tile:active {
    transform: scale(0.98);
  }
  .tile-img {
    width: 100%;
    max-width: 250px;
    height: auto;
    display: block;
    border-radius: 15px;
  }
</style>
</head>
<body>

  <!-- Ваша точная, проверенная ссылка из скрепки -->
  <a href="https://sites.google.com/view/managerial-economics-mba/%D1%84%D1%83%D0%BD%D0%B4%D0%B0%D0%BC%D0%B5%D0%BD%D1%82%D0%B0%D0%BB%D1%8C%D0%BD%D1%8B%D0%B5-%D0%BF%D1%80%D0%B8%D0%BD%D1%86%D0%B8%D0%BF%D1%8B-%D1%83%D0%BF%D1%80%D0%B0%D0%B2%D0%BB%D0%B5%D0%BD%D1%87%D0%B5%D1%81%D0%BA%D0%BE%D0%B9-%D1%8D%D0%BA%D0%BE%D0%BD%D0%BE%D0%BC%D0%B8%D0%BA%D0%B8" target="_parent" class="main-tile">
    <img src="pic-principles.png" class="tile-img" alt="Фундаментальные принципы">
  </a>

</body>
</html>
