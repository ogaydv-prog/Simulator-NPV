<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Полное копирование базовых стилей из шаблона Презентации */
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: transparent; 
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
        }

        /* Главный контейнер, который в исходном состоянии не мешает центровке */
        .main-container {
            display: flex;
            width: 100%;
            height: 100%;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* ОБЕРТКА КНОПКИ: По умолчанию занимает 100% пространства, как в Презентации */
        .btn-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: width 0.4s cubic-bezier(0.25, 0.8, 0.25, 1), height 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        
        /* Стили самой ссылки-кнопки (Полное совпадение с шаблоном) */
        .btn-link { 
            display: block; 
            width: 100%; 
            height: 100%; 
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), filter 0.3s ease; 
            text-decoration: none;
            cursor: pointer;
        }
        
        /* Эффект оживления: плавное увеличение и неоновая подсветка */
        .btn-link:hover { 
            transform: scale(1.02); 
            filter: drop-shadow(0 0 12px rgba(52, 152, 219, 0.7)); 
        }

        .btn-link:active {
            transform: scale(0.98);
        }
        
        /* Картинка-кнопка: масштабируется без искажений и строго по центру */
        .btn-img { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
            display: block; 
        }

        /* КАРТОЧКА «КИНОПЛЕНКА 80-Х» */
        .film-card {
            width: 0;
            height: 0;
            opacity: 0;
            visibility: hidden;
            overflow: hidden;
            background: #111111;
            border-left: 0px dashed #333;
            border-right: 0px dashed #333;
            position: relative;
            border-radius: 6px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0;
            box-sizing: border-box;
            transition: width 0.4s cubic-bezier(0.25, 0.8, 0.25, 1), 
                        height 0.4s cubic-bezier(0.25, 0.8, 0.25, 1), 
                        opacity 0.4s ease, 
                        padding 0.4s ease;
        }

        /* Перфорационные отверстия старой кинопленки (сверху и снизу) */
        .film-card::before, .film-card::after {
            content: '';
            position: absolute;
            left: 0;
            width: 100%;
            height: 10px;
            background-image: linear-gradient(to right, #000 0px, #000 12px, transparent 12px, transparent 24px);
            background-size: 24px 10px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .film-card::before { top: 6px; }
        .film-card::after { bottom: 6px; }

        /* Заголовок кинопленки */
        .film-title {
            margin: 0 0 12px 0;
            color: #f1c40f; /* Ретро-желтый цвет */
            font-size: 15px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border-bottom: 1px solid #222;
            padding-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Список видеоматериалов */
        .video-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .video-item {
            margin: 0;
        }

        .video-item a {
            color: #e0e0e0;
            text-decoration: none;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
            line-height: 1.4;
        }

        .video-item a:hover {
            color: #3498db;
            transform: translateX(4px);
        }

        /* АКТИВНОЕ СОСТОЯНИЕ (При клике) */
        .main-container.active {
            gap: 20px;
        }

        /* Сжатие кнопки для освобождения места под кинопленку */
        .main-container.active .btn-wrapper {
            width: 200px;
        }

        /* Раскрытие кинопленки */
        .main-container.active .film-card {
            width: calc(100% - 220px);
            height: 90%;
            opacity: 1;
            visibility: visible;
            padding: 20px 25px;
            border-left: 5px dashed #2a2a2a;
            border-right: 5px dashed #2a2a2a;
        }

        .main-container.active .film-card::before, 
        .main-container.active .film-card::after {
            opacity: 1;
        }

        /* АДАПТИВНОСТЬ ДЛЯ ДЕВАЙСОВ И УЗКИХ ФРЕЙМОВ */
        @media (max-width: 550px) {
            .main-container.active {
                flex-direction: column;
                gap: 10px;
            }
            .main-container.active .btn-wrapper {
                width: 100%;
                height: 40%;
            }
            .main-container.active .film-card {
                width: 100%;
                height: 55%;
            }
        }
    </style>
</head>
<body>

    <div class="main-container" id="mainContainer">
        <!-- Блок кнопки (по умолчанию занимает 100%) -->
        <div class="btn-wrapper">
            <div class="btn-link" id="videoBtn" title="Нажмите, чтобы открыть видео">
                <img src="https://raw.githubusercontent.com/ogaydv-prog/Simulator-NPV/main/pic-video7.png" 
                     alt="Открыть видеоматериалы" class="btn-img">
            </div>
        </div>

        <!-- Скрытая ретро-карточка кинопленки -->
        <div class="film-card" id="filmCard">
            <div class="film-title">🎬 Видеоматериалы: Олигополия</div>
            <ul class="video-list">
                <li class="video-item">
                    <a href="https://www.youtube.com/watch?v=c-yK5TnaQmo" target="_blank" rel="noopener noreferrer">▶️ Модели Курно и Бертранда — Анализ</a>
                </li>
                <li class="video-item">
                    <a href="https://www.youtube.com/watch?v=PeQKddInz5c" target="_blank" rel="noopener noreferrer">▶️ Модель Штакельберга: Лидерство</a>
                </li>
                <li class="video-item">
                    <a href="https://www.youtube.com/watch?v=GFF6rtk0z4c" target="_blank" rel="noopener noreferrer">▶️ Ломаная кривая спроса олигополии</a>
                </li>
                <li class="video-item">
                    <a href="https://www.youtube.com/watch?v=U-miKGEyMhg" target="_blank" rel="noopener noreferrer">▶️ Теория игр и Стратегии взаимодействия</a>
                </li>
                <li class="video-item">
                    <a href="https://www.youtube.com/watch?v=38kALMkU9K8" target="_blank" rel="noopener noreferrer">▶️ Практический кейс: Ценовые войны</a>
                </li>
                <li class="video-item">
                    <a href="https://ru.euronews.com/my-europe/2026/06/19/game-changer-sweets-the-bavarian-start-up-making-sustainable-chocolate-from-sunflowers" target="_blank" rel="noopener noreferrer">🌱 Euronews: Экологичный шоколад из Баварии</a>
                </li>
            </ul>
        </div>
    </div>

    <script>
        const videoBtn = document.getElementById('videoBtn');
        const mainContainer = document.getElementById('mainContainer');

        videoBtn.addEventListener('click', (e) => {
            e.preventDefault();
            mainContainer.classList.toggle('active');
        });
    </script>
</body>
</html>
