<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Идеальный сброс отступов и центрирование элементов по вертикали, как в оригинале */
        html, body { 
            margin: 0; 
            padding: 0; 
            display: flex; 
            justify-content: flex-start; /* Оставляем общее выравнивание от левого края для ряда */
            align-items: center; 
            height: 100vh; 
            background: transparent; 
            overflow: hidden; 
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        /* Общий контейнер-ряд */
        .main-container {
            display: flex;
            align-items: center;
            width: 100%;
            height: 100%;
            gap: 20px;
        }
        
        /* КНОПКА: Полное сохранение структуры, логики размеров и центровки из вашего шаблона */
        .btn-box {
            height: 100%;
            aspect-ratio: 1 / 1; /* Делает область кнопки ровным квадратом на всю высоту фрейма */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-link { 
            display: block; 
            width: 100%; 
            height: 100%; 
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.3s ease; 
            cursor: pointer; 
            text-decoration: none;
        }
        
        /* Эффект оживления кнопки (увеличение 1.05 и подсветка) */
        .btn-link:hover { 
            transform: scale(1.05); 
            filter: brightness(1.15) drop-shadow(0 0 15px rgba(255, 255, 255, 0.3)); 
        }

        /* Эффект нажатия (сжатие) */
        .btn-link:active {
            transform: scale(0.98);
        }
        
        /* Картинка внутри кнопки: четко по центру, без искажений, с равными отступами */
        .btn-img { 
            display: block; 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
        }

        /* КАРТОЧКА «КИНОПЛЕНКА 80-Х» */
        .film-card {
            flex-grow: 1;
            max-width: 550px; /* Ограничение максимальной ширины карточки */
            height: 90%; /* Оставляем небольшие зазоры сверху и снизу для реалистичности */
            background: #151515;
            border-left: 5px dashed #262626;
            border-right: 5px dashed #262626;
            position: relative;
            border-radius: 4px;
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.7), inset 0 0 20px rgba(255,255,255,0.02);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 10px 30px;
            box-sizing: border-box;
            
            /* Плавное появление */
            opacity: 0;
            transform: translateX(-20px);
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            visibility: hidden;
        }

        /* Состояние активации карточки */
        .film-card.active {
            opacity: 1;
            transform: translateX(0);
            visibility: visible;
        }

        /* Перфорация старой кинопленки (сверху и снизу) */
        .film-card::before, .film-card::after {
            content: '';
            position: absolute;
            left: 0;
            width: 100%;
            height: 10px;
            background-image: linear-gradient(to right, #000 0px, #000 12px, transparent 12px, transparent 24px);
            background-size: 24px 10px;
        }
        .film-card::before { top: 6px; }
        .film-card::after { bottom: 6px; }

        /* Стиль ретро-заголовка */
        .film-card h3 {
            margin: 0 0 14px 0;
            color: #f1c40f; 
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border-bottom: 1px solid #2a2a2a;
            padding-bottom: 6px;
        }

        /* Список видео-ссылок */
        .video-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .video-item a {
            color: #dddddd;
            text-decoration: none;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s ease;
        }

        .video-item a:hover {
            color: #3498db;
            transform: translateX(6px);
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="btn-box">
            <div class="btn-link" id="videoBtn">
                <img src="https://raw.githubusercontent.com/ogaydv-prog/Simulator-NPV/main/pic-video7.png" 
                     alt="Открыть видеоматериалы" class="btn-img">
            </div>
        </div>

        <div class="film-card" id="filmCard">
            <h3>🎬 Видеоматериалы: Олигополия</h3>
            <ul class="video-list">
                <li class="video-item"><a href="https://www.youtube.com/watch?v=c-yK5TnaQmo" target="_blank">▶️ Модели Курно и Бертранда — Анализ</a></li>
                <li class="video-item"><a href="https://www.youtube.com/watch?v=PeQKddInz5c" target="_blank">▶️ Модель Штакельберга: Лидерство на рынке</a></li>
                <li class="video-item"><a href="https://www.youtube.com/watch?v=GFF6rtk0z4c" target="_blank">▶️ Ломаная кривая спроса олигополии</a></li>
                <li class="video-item"><a href="https://www.youtube.com/watch?v=U-miKGEyMhg" target="_blank">▶️ Теория игр и Стратегические взаимодействия</a></li>
                <li class="video-item"><a href="https://www.youtube.com/watch?v=38kALMkU9K8" target="_blank">▶️ Практический кейс: Ценовые войны</a></li>
            </ul>
        </div>
    </div>

    <script>
        const btn = document.getElementById('videoBtn');
        const card = document.getElementById('filmCard');

        btn.addEventListener('click', () => {
            card.classList.toggle('active');
        });
    </script>
</body>
</html>
