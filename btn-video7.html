<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Базовые настройки адаптивности */
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: transparent; 
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        /* Общий контейнер, выстраивающий элементы в ряд */
        .main-container {
            display: flex;
            align-items: center;
            width: 100%;
            height: 100%;
            gap: 20px;
        }
        
        /* ЗОНА КНОПКИ (Сохранена логика вашего шаблона презентации) */
        .btn-box {
            flex-shrink: 0;
            width: 220px; /* Фиксированная ширина кнопки-картинки */
            height: 100%;
        }

        .btn-link { 
            display: block; 
            width: 100%; 
            height: 100%; 
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), filter 0.3s ease; 
            cursor: pointer;
        }
        
        /* Эффект оживления кнопки при наведении */
        .btn-link:hover { 
            transform: scale(1.03); 
            filter: drop-shadow(0 0 12px rgba(52, 152, 219, 0.7)); 
        }

        .btn-link:active {
            transform: scale(0.98);
        }
        
        /* Точное копирование подгонки картинки из шаблона */
        .btn-img { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
            display: block; 
        }

        /* КАРТОЧКА «КИНОПЛЕНКА 80-Х» */
        .film-card {
            flex-grow: 1;
            height: calc(100% - 40px); /* Отступы сверху/снизу */
            background: #1a1a1a;
            border-left: 4px dashed #333;
            border-right: 4px dashed #333;
            position: relative;
            border-radius: 6px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5), inset 0 0 15px rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 10px 25px;
            
            /* Анимация плавного появления */
            opacity: 0;
            transform: translateX(-30px) scale(0.95);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            visibility: hidden;
        }

        /* Состояние когда карточка открыта */
        .film-card.active {
            opacity: 1;
            transform: translateX(0) scale(1);
            visibility: visible;
        }

        /* Перфорация старой кинопленки (сверху и снизу) */
        .film-card::before, .film-card::after {
            content: '';
            position: absolute;
            left: 0;
            width: 100%;
            height: 12px;
            background-image: linear-gradient(to right, #000 0px, #000 10px, transparent 10px, transparent 20px);
            background-size: 20px 12px;
        }
        .film-card::before { top: 4px; }
        .film-card::after { bottom: 4px; }

        /* Заголовок внутри карточки */
        .film-card h3 {
            margin: 0 0 12px 0;
            color: #f1c40f; /* Ретро-желтый оттенок */
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
        }

        /* Список ссылок */
        .video-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .video-item a {
            color: #ecf0f1;
            text-decoration: none;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        /* Подсветка ссылок при наведении внутри карточки */
        .video-item a:hover {
            color: #3498db;
            transform: translateX(5px);
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="btn-box">
            <div class="btn-link" id="videoBtn">
                <img src="https://raw.githubusercontent.com/ogaydv-prog/Simulator-NPV/main/pic-video7.png" 
                     alt="Открыть видеоматериалы" class="btn-img">
            </div>
        </div>

        <div class="film-card" id="filmCard">
            <h3>🎬 Видеоматериалы: Олигополия</h3>
            <ul class="video-list">
                <li class="video-item"><a href="https://www.youtube.com/watch?v=c-yK5TnaQmo" target="_blank">▶️ Модели Курно и Бертранда — Анализ</a></li>
                <li class="video-item"><a href="https://www.youtube.com/watch?v=PeQKddInz5c" target="_blank">▶️ Модель Штакельберга: Лидерство на рынке</a></li>
                <li class="video-item"><a href="https://www.youtube.com/watch?v=GFF6rtk0z4c" target="_blank">▶️ Ломаная кривая спроса олигополии</a></li>
                <li class="video-item"><a href="https://www.youtube.com/watch?v=U-miKGEyMhg" target="_blank">▶️ Теория игр и Стратегические взаимодействия</a></li>
                <li class="video-item"><a href="https://www.youtube.com/watch?v=38kALMkU9K8" target="_blank">▶️ Практический кейс: Ценовые войны</a></li>
            </ul>
        </div>
    </div>

    <script>
        // Скрипт для открытия карточки по клику
        const btn = document.getElementById('videoBtn');
        const card = document.getElementById('filmCard');

        btn.addEventListener('click', () => {
            card.classList.toggle('active');
        });
    </script>
</body>
</html>
