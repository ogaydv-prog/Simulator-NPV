<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Интерактивная кнопка Практическое задание</title>
<style>
  body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  
  /* Фирменная пружинящая кнопка */
  .main-tile-btn {
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
    display: inline-block;
    transition: transform 0.25s cubic-bezier(0.25, 0.8, 0.25, 1), filter 0.25s ease;
    outline: none;
    -webkit-tap-highlight-color: transparent;
  }
  
  /* Эффект увеличения и мягкого золотисто-янтарного свечения (под цвет новой шапки) */
  .main-tile-btn:hover {
    transform: scale(1.05);
    filter: drop-shadow(0 10px 20px rgba(0,0,0,0.15)) drop-shadow(0 0 12px rgba(234, 179, 8, 0.65));
  }
  
  .main-tile-btn:active {
    transform: scale(0.98);
  }
  
  .tile-img {
    width: 100%;
    max-width: 250px; /* Идеальный размер, соответствующий остальным плиткам */
    height: auto;
    display: block;
    border-radius: 12px;
  }
</style>
</head>
<body>

  <button id="btn-task" class="main-tile-btn">
    <!-- Изображение вашей новой желтой карточки практического задания -->
    <img src="pic-task2.png" class="tile-img" alt="Практическое задание: Симулятор рынка кофе Астаны" onerror="this.src='https://placehold.co/250x250/ffe082/1e293b?text=Задание+2'">
  </button>

<script>
  document.getElementById("btn-task").addEventListener("click", function() {
    // Надежный переход к странице практического кейса
    window.open("https://ogaydv-prog.github.io/Simulator-NPV/task-coffee-astana.html", "_blank");
  });
</script>

</body>
</html>
</html>
