<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<style>
  :root {
    --size: 250px;
    /* Теперь здесь можно легко менять отступы независимо */
    --padding-top: 20px;
    --padding-bottom: 40px; 
    --padding-sides: 2px;
  }

  body, html {
    margin: 0;
    padding: 0;
    width: var(--size);
    height: var(--size);
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .card-button {
    width: var(--size);
    height: var(--size);
    display: flex;
    justify-content: center;
    align-items: center;
    /* Применяем переменные для отступов */
    padding: var(--padding-top) var(--padding-sides) var(--padding-bottom) var(--padding-sides);
    box-sizing: border-box;
    text-decoration: none;
    border-radius: 12px;
    transition: transform 0.2s;
  }

  .card-button:hover {
    transform: scale(1.03);
  }

  .tile-img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }
</style>
</head>
<body>

<a href="#" class="card-button">
  <img src="pic-lecture6.png" class="tile-img" alt="Лекция 6">
</a>

</body>
</html>
