<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>btn-lecture6</title>
<style>
  body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: transparent;
    display: flex;
    justify-content: center; /* Центрирование кнопки по горизонтали */
    align-items: center;     /* Центрирование кнопки по вертикали */
    height: 100vh;
  }

  /* Контейнер кнопки. Убрали жесткую квадратную обрезку */
  .card-button {
    background-color: transparent;
    width: 100%;
    max-width: 250px;        /* Максимальная ширина как у соседних кнопок */
    height: auto;
    cursor: pointer;
    border-radius: 12px;
    display: flex;
    justify-content: center;
    align-items: center;
    text-decoration: none;
    outline: none;
    /* Плавная анимация масштабирования и свечения */
    transition: transform 0.25s cubic-bezier(0.25, 0.8, 0.25, 1), filter 0.25s ease;
  }

  /* Эффект плавного оживления и неоновой подсветки при наведении */
  .card-button:hover {
    transform: scale(1.05); /* Легкое увеличение */
    filter: drop-shadow(0 0 12px rgba(59, 130, 246, 0.7)); /* Синее свечение без размытия границ самой картинки */
  }

  /* Свойства картинки: гарантируют полное отображение БЕЗ обрезки сверху */
  .tile-img {
    width: 100%;
    height: auto;
    max-height: 250px;
    object-fit: contain; /* Картинка полностью помещается в область, не срезая верх и низ */
    display: block;
    border: none;
  }
</style>
</head>
<body>

<!-- Кнопка-ссылка без лишних текстов и списков -->
<a href="https://docs.google.com/document/d/1NWM2a3qc2xLVPJ9l0yU6tgeqCiS03pel/edit?usp=drive_link&ouid=109725301150629205728&rtpof=true&sd=true" 
   target="_blank" 
   class="card-button" 
   title="Открыть лекцию">
  <img src="pic-lecture6.png" class="tile-img" alt="Лекция: Природа отрасли">
</a>

</body>
</html>
