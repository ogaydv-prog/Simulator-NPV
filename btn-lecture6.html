<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>btn-lecture6</title>
<style>
  /* Убираем все отступы и заставляем страницу занимать 100% размера iframe */
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: transparent;
  }

  /* Кнопка-ссылка заполняет весь iframe целиком, как соседние кнопки */
  .card-button {
    display: block;
    width: 100%;
    height: 100%;
    text-decoration: none;
    outline: none;
    border-radius: 12px; /* Радиус скругления углов */
    overflow: hidden;
    box-sizing: border-box;
    /* Плавная анимация увеличения и тени при наведении */
    transition: transform 0.2s cubic-bezier(0.25, 0.8, 0.25, 1), box-shadow 0.2s ease;
  }

  /* Эффект при наведении — легкое увеличение и аккуратное синее свечение */
  .card-button:hover {
    transform: scale(1.02);
    box-shadow: 0 0 15px rgba(59, 130, 246, 0.6);
  }

  /* Изображение заполняет всю площадь кнопки без обрезки по краям */
  .tile-img {
    width: 100%;
    height: 100%;
    object-fit: fill; /* Растягивает картинку ровно по границам кнопки (как в видео 6 / артикл 6) */
    display: block;
    border: none;
  }
</style>
</head>
<body>

<a href="https://docs.google.com/document/d/1NWM2a3qc2xLVPJ9l0yU6tgeqCiS03pel/edit?usp=drive_link&ouid=109725301150629205728&rtpof=true&sd=true" 
   target="_blank" 
   class="card-button" 
   title="Открыть лекцию">
  <img src="pic-lecture6.png" class="tile-img" alt="Лекция 6">
</a>

</body>
</html>
