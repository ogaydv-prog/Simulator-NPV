<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    /* Убрано overflow:hidden, чтобы дать картинке свободу */
  }

  .card-button {
    display: block;
    width: 100%;
    height: 100%;
    text-decoration: none;
    /* Никаких ограничений, рамка задает размер */
  }

  .tile-img {
    width: 100%;
    height: 100%;
    display: block;
    /* Картинка растягивается строго по рамке */
    object-fit: fill; 
    transition: transform 0.2s ease;
  }

  .card-button:hover .tile-img {
    transform: scale(1.03);
    filter: drop-shadow(0 0 10px rgba(249, 115, 22, 0.8));
  }
</style>
</head>
<body>

<a href="https://docs.google.com/document/d/1NWM2a3qc2xLVPJ9l0yU6tgeqCiS03pel/edit?usp=drive_link&ouid=109725301150629205728&rtpof=true&sd=true" 
   target="_blank" 
   class="card-button">
   
  <img src="https://ogaydv-prog.github.io/Simulator-NPV/pic-lecture6.png" 
       class="tile-img" 
       alt="Лекция 6">
</a>

</body>
</html>
