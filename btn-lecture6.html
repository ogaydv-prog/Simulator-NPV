<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<style>
  :root {
    --size: 250px;
    --vertical-padding: 20px;   /* Отступ сверху и снизу */
    --horizontal-padding: 2px;  /* Минимальный отступ по бокам */
  }

  body, html {
    margin: 0;
    padding: 0;
    width: var(--size);
    height: var(--size);
    display: flex;
    justify-content: center;
    align-items: center;
    background: transparent;
  }

  .card-button {
    width: var(--size);
    height: var(--size);
    display: flex;
    justify-content: center;
    align-items: center;
    /* Первый параметр (20px) - вертикаль, второй (2px) - горизонталь */
    padding: var(--vertical-padding) var(--horizontal-padding);
    box-sizing: border-box;
    text-decoration: none;
    border-radius: 12px;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
  }

  .card-button:hover {
    transform: scale(1.03);
    box-shadow: 0 0 15px rgba(59, 130, 246, 0.6);
  }

  .tile-img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    display: block;
  }
</style>
</head>
<body>

<a href="https://docs.google.com/document/d/1NWM2a3qc2xLVPJ9l0yU6tgeqCiS03pel/edit?usp=drive_link" 
   target="_blank" 
   class="card-button">
  <img src="pic-lecture6.png" class="tile-img" alt="Лекция 6">
</a>

</body>
</html>
