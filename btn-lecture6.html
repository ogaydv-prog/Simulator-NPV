<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>btn-lecture6</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .card-button {
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    text-decoration: none;
    outline: none;
    background: transparent;
    box-sizing: border-box;
    padding: 8px;
    overflow: hidden;
  }

  .tile-img {
    width: 100%;
    height: 100%;
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    border: none;
    display: none;
    transition: transform 0.2s ease-in-out, filter 0.2s ease-in-out;
    border-radius: 12px;
  }

  .card-button:hover .tile-img {
    transform: scale(1.03);
    filter: drop-shadow(0 0 10px rgba(249, 115, 22, 0.8));
  }

  .fallback-card {
    width: 100%;
    height: 100%;
    max-width: 100%;
    max-height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
    border: 2px solid #f97316;
    border-radius: 12px;
    color: #ffffff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    box-sizing: border-box;
    padding: 10px;
    text-align: center;
    box-shadow: inset 0 0 15px rgba(249, 115, 22, 0.15);
  }

  .fallback-icon {
    width: 30%;
    height: auto;
    max-height: 40px;
    color: #f97316;
    margin-bottom: 8px;
  }

  .fallback-title {
    font-size: clamp(10px, 4vw, 15px);
    font-weight: 700;
    margin: 0;
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    width: 100%;
  }
</style>
</head>
<body>

<a href="https://docs.google.com/document/d/1NWM2a3qc2xLVPJ9l0yU6tgeqCiS03pel/edit?usp=drive_link&ouid=109725301150629205728&rtpof=true&sd=true" 
   target="_blank" 
   class="card-button">
  
  <div id="fallback" class="fallback-card">
    <svg class="fallback-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
      <polyline points="14 2 14 8 20 8"></polyline>
      <line x1="16" y1="13" x2="8" y2="13"></line>
      <line x1="16" y1="17" x2="8" y2="17"></line>
    </svg>
    <div class="fallback-title">Лекция 6</div>
  </div>

  <img src="https://ogaydv-prog.github.io/Simulator-NPV/pic-lecture6.png" 
       id="real-img" 
       class="tile-img" 
       alt="Лекция 6" 
       onload="showImage()" 
       onerror="showFallback()">
</a>

<script>
  function showImage() {
    document.getElementById('real-img').style.display = 'block';
    document.getElementById('fallback').style.display = 'none';
  }
  
  function showFallback() {
    document.getElementById('real-img').style.display = 'none';
    document.getElementById('fallback').style.display = 'flex';
  }
</script>

</body>
</html>
</html>
