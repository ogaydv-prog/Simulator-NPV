<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root {
    --size: 250px;
    /* Управляйте отступами здесь */
    --padding-top: 20px;
    --padding-bottom: 40px; 
    --padding-sides: 2px;
  }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    background-color: #f0f0f0;
  }

  .card-button {
    width: var(--size);
    height: var(--size);
    /* Flex обеспечивает центрирование контента внутри */
    display: flex;
    justify-content: center;
    align-items: center;
    /* Учитываем отступы в расчете размеров */
    padding: var(--padding-top) var(--padding-sides) var(--padding-bottom) var(--padding-sides);
    box-sizing: border-box;
    text-decoration: none;
    border-radius: 12px;
    background: white;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    transition: transform 0.2s;
  }

  .tile-img {
    /* Картинка не должна быть больше доступного места */
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    display: block;
  }
</style>
</head>
<body>

<a href="#" class="card-button">
  <img src="pic-lecture6.png" class="tile-img" alt="Лекция 6" onerror="this.style.display='none'; this.parentNode.innerHTML='Изображение не найдено'">
</a>

</body>
</html>
</html>
