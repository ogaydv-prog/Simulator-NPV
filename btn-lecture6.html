<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  /* Фиксируем размеры, идентичные остальным кнопкам */
  :root {
    --size: 250px;
  }

  body {
    margin: 0;
    padding: 0;
    width: var(--size);
    height: var(--size);
    overflow: hidden;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .card-button {
    width: var(--size);
    height: var(--size);
    display: block;
    text-decoration: none;
    border-radius: 12px;
    overflow: hidden;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
  }

  /* Тот же эффект оживления, что и у остальных */
  .card-button:hover {
    transform: scale(1.03);
    box-shadow: 0 0 15px rgba(59, 130, 246, 0.6);
  }

  .tile-img {
    width: 100%;
    height: 100%;
    object-fit: fill; /* Гарантирует заполнение без обрезки */
    display: block;
  }
</style>
</head>
<body>

<a href="https://docs.google.com/document/d/1NWM2a3qc2xLVPJ9l0yU6tgeqCiS03pel/edit?usp=drive_link&ouid=109725301150629205728&rtpof=true&sd=true" 
   target="_blank" 
   class="card-button">
  <img src="pic-lecture6.png" class="tile-img">
</a>

</body>
</html>
