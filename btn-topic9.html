<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Полный сброс отступов и жесткое скрытие прокрутки */
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background: transparent; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }
        
        /* Ссылочный контейнер с анимацией и центрированием содержимого */
        .btn-link { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            width: 100%; 
            height: 100%; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            cursor: pointer; 
            text-decoration: none;
            border-radius: 12px;
            overflow: hidden;
        }
        
        /* Эффект оживления и свечения при наведении */
        .btn-link:hover { 
            transform: scale(1.08); 
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.5)); 
        }
        
        /* Эффект нажатия (сжатие) */
        .btn-link:active { 
            transform: scale(0.98); 
        }
        
        /* Идеальное масштабирование и центрирование картинки */
        .btn-img { 
            max-width: 95%; 
            max-height: 95%; 
            object-fit: contain; 
            display: block; 
        }
    </style>
</head>
<body>

    <a href="https://ogaydv-prog.github.io/Simulator-NPV/gosudarstvennoe-regulirovanie-ekonomiki.html" 
       target="_top" 
       class="btn-link">
         <img src="https://raw.githubusercontent.com/ogaydv-prog/Simulator-NPV/main/pic-topic9.png" 
              class="btn-img" 
              alt="Раздел: Государственное регулирование экономики">
    </a>

</body>
</html>
