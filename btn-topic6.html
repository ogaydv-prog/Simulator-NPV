<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background: transparent; 
            overflow: hidden; 
        }
        .btn-link { 
            display: block; 
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.3s ease; 
            cursor: pointer; 
            line-height: 0; 
            width: 100%; 
            height: 100%;
        }
        .btn-link:hover { 
            transform: scale(1.05); 
            filter: brightness(1.2) drop-shadow(0 0 10px rgba(56, 189, 248, 0.65)); 
        }
        .btn-link:active { 
            transform: scale(0.98); 
        }
        .btn-img { 
            display: block; 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
            border-radius: 12px;
        }
    </style>
</head>
<body>

    <!-- 
       Используем target="_top" для гарантированного открытия страницы 
       в текущем окне браузера, обходя ограничения iframe 
    -->
    <a href="https://sites.google.com/view/managerial-economics-mba/занятия/природа-отрасли-монополия-и-монополистическая-конкуренция" 
       target="_top" 
       class="btn-link">
        <img src="https://raw.githubusercontent.com/ogaydv-prog/Simulator-NPV/main/pic-topic6.png" class="btn-img" alt="Природа отрасли">
    </a>

</body>
</html>
