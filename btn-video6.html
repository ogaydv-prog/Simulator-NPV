<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерактивная кнопка-видео</title>
    <style>
        :root {
            --primary-glow: rgba(239, 68, 68, 0.6); /* Красный цвет для видео */
            --bg-menu: #0f172a;
            --text-color: #e2e8f0;
            --border-color: rgba(255, 255, 255, 0.08);
            --hover-item-bg: rgba(255, 255, 255, 0.05);
        }

        html, body {
            margin: 0;
            padding: 0;
            background-color: transparent;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        /* Абсолютно идентичный горизонтальный контейнер для отображения РЯДЫШКОМ */
        .widget-flex-container {
            display: inline-flex;
            align-items: center;
            gap: 16px; 
            padding: 8px;
        }

        /* Кнопка видео: один в один повторяет геометрию статей */
        .image-btn {
            background: transparent;
            border: none;
            padding: 0;
            cursor: pointer;
            outline: none;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), 
                        filter 0.3s ease, 
                        box-shadow 0.3s ease;
            border-radius: 8px;
        }

        .image-btn img {
            display: block;
            max-width: 100%;
            height: auto;
            pointer-events: none;
        }

        .image-btn:hover {
            transform: scale(1.05);
            filter: brightness(1.15);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .image-btn:active {
            transform: scale(0.98);
        }

        /* Список видео: открывается справа рядышком, без обрезания нижнего края */
        .links-menu {
            display: none;
            background-color: var(--bg-menu);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            padding: 6px 0;
            min-width: 320px;
            opacity: 0;
            transform: translateX(-10px);
            transition: opacity 0.25s ease, transform 0.25s ease;
        }

        .links-menu.show {
            display: block;
            opacity: 1;
            transform: translateX(0);
        }

        .links-menu a {
            display: flex;
            align-items: center;
            padding: 10px 16px;
            color: var(--text-color);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            line-height: 1.4;
            transition: background-color 0.2s ease, color 0.2s ease;
            border-left: 3px solid transparent;
        }

        .links-menu a:hover {
            background-color: var(--hover-item-bg);
            color: #fff;
            border-left-color: #ef4444;
        }

        /* Иконка плеера перед ссылкой видео */
        .links-menu a::before {
            content: "▶";
            color: #ef4444;
            margin-right: 8px;
            font-size: 10px;
        }

        .links-menu .divider {
            height: 1px;
            background-color: var(--border-color);
            margin: 4px 0;
        }
    </style>
</head>
<body>

<div class="widget-flex-container">
    <button class="image-btn" id="videoBtn" title="Просмотреть видеоматериалы">
        <img src="pic-video6.png" alt="Видео">
    </button>

    <div class="links-menu" id="videoMenu">
        <a href="https://www.youtube.com/watch?v=NySt2EDS1Ik&t=78s" target="_blank">
            Рыночные структуры и конкуренция (Часть 1)
        </a>
        <div class="divider"></div>
        <a href="https://www.youtube.com/watch?v=KZfIgh0EWRE" target="_blank">
            Монополистическая конкуренция: Особенности
        </a>
        <div class="divider"></div>
        <a href="https://www.youtube.com/watch?v=KTDGyhazTec" target="_blank">
            Модели Олигополии и стратегический выбор
        </a>
        <div class="divider"></div>
        <a href="https://www.youtube.com/watch?v=YQcb73YMA6c" target="_blank">
            Чистая монополия и максимизация прибыли
        </a>
        <div class="divider"></div>
        <a href="https://www.youtube.com/watch?v=diLKlYISOpw" target="_blank">
            Индекс Херфиндаля-Хиршмана и анализ рынков
        </a>
    </div>
</div>

<script>
    const btn = document.getElementById('videoBtn');
    const menu = document.getElementById('videoMenu');

    btn.addEventListener('click', (e) => {
        e.stopPropagation();
        menu.classList.toggle('show');
    });

    document.addEventListener('click', (e) => {
        if (!menu.contains(e.target) && e.target !== btn) {
            menu.classList.remove('remove');
            menu.classList.remove('show');
        }
    });
</script>

</body>
</html>
</html>
