<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>btn-video6</title>
<style>
  body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  /* 3D Контейнер */
  .flip-card {
    background-color: transparent;
    width: 250px;
    height: 250px;
    perspective: 1000px;
    cursor: pointer;
  }

  .flip-card-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    transform-style: preserve-3d;
  }

  /* Переворот */
  .flip-card.flipped .flip-card-inner {
    transform: rotateY(180deg);
  }

  .flip-card-front, .flip-card-back {
    position: absolute;
    width: 100%;
    height: 100%;
    -webkit-backface-visibility: hidden;
    backface-visibility: hidden;
    border-radius: 12px;
    overflow: hidden;
    box-sizing: border-box;
  }

  /* ЛИЦЕВАЯ СТОРОНА: Только чистая картинка, идеально отцентрованная */
  .flip-card-front {
    background-color: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.25s ease, filter 0.25s ease;
  }

  /* Эффект подсветки и оживления только при наведении на лицевую сторону */
  .flip-card:not(.flipped):hover .flip-card-front {
    transform: scale(1.04);
    filter: drop-shadow(0 0 12px rgba(239, 68, 68, 0.6));
  }

  .tile-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* ОБРАТНАЯ СТОРОНА: Только список ссылок */
  .flip-card-back {
    background-color: #0f172a;
    transform: rotateY(180deg);
    border: 2px solid rgba(239, 68, 68, 0.7);
    padding: 10px;
    display: flex;
    flex-direction: column;
    justify-content: center; /* Центрируем список по вертикали */
    gap: 5px;
  }

  .video-link {
    display: flex;
    align-items: center;
    background: rgba(255, 255, 255, 0.04);
    color: #e2e8f0;
    text-decoration: none;
    padding: 8px 10px;
    border-radius: 6px;
    font-size: 10px;
    font-family: 'Segoe UI', Arial, sans-serif;
    line-height: 1.3;
    text-align: left;
    border: 1px solid rgba(255, 255, 255, 0.06);
    transition: all 0.2s ease;
  }

  .video-link::before {
    content: "▶";
    color: #ef4444;
    margin-right: 6px;
    font-size: 8px;
    flex-shrink: 0;
  }

  .video-link:hover {
    background: rgba(239, 68, 68, 0.15);
    border-color: #ef4444;
    color: #ffffff;
    transform: translateX(4px);
  }
</style>
</head>
<body>

<div class="flip-card" id="card">
  <div class="flip-card-inner">
    
    <!-- Лицевая сторона: Только картинка-кнопка -->
    <div class="flip-card-front">
      <img src="pic-video6.png" class="tile-img">
    </div>

    <!-- Обратная сторона: Только список из видео -->
    <div class="flip-card-back">
      <a href="https://www.youtube.com/watch?v=NySt2EDS1Ik&t=78s" target="_blank" class="video-link">
        Рыночные структуры и конкуренция (Часть 1)
      </a>
      <a href="https://www.youtube.com/watch?v=KZfIgh0EWRE" target="_blank" class="video-link">
        Монополистическая конкуренция: Особенности
      </a>
      <a href="https://www.youtube.com/watch?v=KTDGyhazTec" target="_blank" class="video-link">
        Модели Олигополии и стратегический выбор
      </a>
      <a href="https://www.youtube.com/watch?v=YQcb73YMA6c" target="_blank" class="video-link">
        Чистая монополия и максимизация прибыли
      </a>
      <a href="https://www.youtube.com/watch?v=diLKlYISOpw" target="_blank" class="video-link">
        Индекс Херфиндаля-Хиршмана и анализ рынков
      </a>
    </div>

  </div>
</div>

<script>
  const card = document.getElementById('card');

  card.addEventListener('click', function(e) {
    // Если кликнули по ссылке, карту не переворачиваем назад
    if (e.target.tagName === 'A') return;
    
    // В остальных случаях переключаем переворот туда-обратно
    card.classList.toggle('flipped');
  });
</script>

</body>
</html>
