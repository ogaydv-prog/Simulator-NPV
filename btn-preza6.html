<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>btn-preza6</title>
<style>
  /* Обнуляем все отступы, чтобы код занимал ровно 100% фрейма Google Sites */
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden; /* Жестко убирает любые полосы прокрутки */
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  /* Ссылка-контейнер растягивается на всю синюю рамку */
  .card-button {
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    text-decoration: none;
    outline: none;
    background: transparent;
    box-sizing: border-box;
    padding: 8px; /* Небольшой зазор внутри рамки, чтобы свечению было куда расти */
    overflow: hidden;
  }

  /* Картинка плавно подстраивается под размеры рамки */
  .tile-img {
    width: 100%;
    height: 100%;
    max-width: 100%;
    max-height: 100%;
    object-fit: contain; /* Картинка сохраняет свои пропорции при любом сжатии */
    border: none;
    display: none; /* Скрыта до полной загрузки */
    transition: transform 0.2s ease-in-out, filter 0.2s ease-in-out;
    border-radius: 12px;
  }

  /* Эффект свечения и увеличения применяется ТОЛЬКО к самой картинке, 
     что гарантирует отсутствие полос прокрутки во фрейме Google Sites */
  .card-button:hover .tile-img {
    transform: scale(1.03); /* Легкое элегантное увеличение */
    filter: drop-shadow(0 0 10px rgba(249, 115, 22, 0.8)); /* Оранжевый неоновый ореол */
  }

  /* Адаптивная заглушка на случай сбоя сети */
  .fallback-card {
    width: 100%;
    height: 100%;
    max-width: 100%;
    max-height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
    border: 2px solid #f97316;
    border-radius: 12px;
    color: #ffffff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    box-sizing: border-box;
    padding: 10px;
    text-align: center;
    box-shadow: inset 0 0 15px rgba(249, 115, 22, 0.15);
  }

  .fallback-icon {
    width: 30%;
    height: auto;
    max-height: 40px;
    color: #f97316;
    margin-bottom: 8px;
  }

  .fallback-title {
    font-size: clamp(10px, 4vw, 15px); /* Текст уменьшается, если рамка очень маленькая */
    font-weight: 700;
    margin: 0;
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    width: 100%;
  }
</style>
</head>
<body>

<a href="https://docs.google.com/presentation/d/1g3Vf1ybpfLlKyGmzbvI0j6Og9wUV2zw9/edit?usp=sharing&ouid=109725301150629205728&rtpof=true&sd=true" 
   target="_blank" 
   class="card-button">
  
  <!-- Заглушка (пока картинка грузится) -->
  <div id="fallback" class="fallback-card">
    <svg class="fallback-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
      <line x1="8" y1="21" x2="16" y2="21"></line>
      <line x1="12" y1="17" x2="12" y2="21"></line>
    </svg>
    <div class="fallback-title">Презентация 6</div>
  </div>

  <!-- Ваша оригинальная картинка из репозитория GitHub -->
  <img src="https://ogaydv-prog.github.io/Simulator-NPV/pic-preza6.png" 
       id="real-img" 
       class="tile-img" 
       alt="Презентация 6" 
       onload="showImage()" 
       onerror="showFallback()">
</a>

<script>
  function showImage() {
    document.getElementById('real-img').style.display = 'block';
    document.getElementById('fallback').style.display = 'none';
  }
  
  function showFallback() {
    document.getElementById('real-img').style.display = 'none';
    document.getElementById('fallback').style.display = 'flex';
  }
</script>

</body>
</html>
