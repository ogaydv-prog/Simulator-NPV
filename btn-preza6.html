<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>btn-preza6</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .card-button {
    width: 250px;
    height: 250px;
    display: flex;
    justify-content: center;
    align-items: center;
    text-decoration: none;
    outline: none;
    background: transparent;
    transition: transform 0.25s ease, filter 0.25s ease;
    position: relative;
    border-radius: 20px;
  }

  /* Эффект оживления и теплого оранжевого свечения для презентации */
  .card-button:hover {
    transform: scale(1.04);
    filter: drop-shadow(0 0 15px rgba(249, 115, 22, 0.6));
  }

  /* Оригинальная картинка */
  .tile-img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    border: none;
    display: none; /* Скрыта, пока не загрузится на GitHub */
  }

  /* Заглушка для корректного отображения в окне предпросмотра */
  .fallback-card {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
    border: 2px solid #f97316;
    border-radius: 20px;
    color: #ffffff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    box-sizing: border-box;
    padding: 24px;
    text-align: center;
    box-shadow: inset 0 0 20px rgba(249, 115, 22, 0.15);
  }

  .fallback-icon {
    width: 64px;
    height: 64px;
    color: #f97316;
    margin-bottom: 16px;
    filter: drop-shadow(0 0 8px rgba(249, 115, 22, 0.5));
  }

  .fallback-title {
    font-size: 22px;
    font-weight: 700;
    margin: 0 0 6px 0;
    letter-spacing: -0.02em;
  }

  .fallback-subtitle {
    font-size: 12px;
    color: #94a3b8;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
</style>
</head>
<body>

<a href="https://docs.google.com/presentation/d/1g3Vf1ybpfLlKyGmzbvI0j6Og9wUV2zw9/edit?usp=sharing&ouid=109725301150629205728&rtpof=true&sd=true" 
   target="_blank" 
   class="card-button">
  
  <div id="fallback" class="fallback-card">
    <svg class="fallback-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
      <line x1="8" y1="21" x2="16" y2="21"></line>
      <line x1="12" y1="17" x2="12" y2="21"></line>
    </svg>
    <div class="fallback-title">Презентация 6</div>
    <div class="fallback-subtitle">Открыть слайды</div>
  </div>

  <img src="pic-preza6.png" 
       id="real-img" 
       class="tile-img" 
       alt="Презентация 6" 
       onload="showImage()" 
       onerror="showFallback()">
</a>

<script>
  function showImage() {
    document.getElementById('real-img').style.style.display = 'block';
    document.getElementById('fallback').style.display = 'none';
  }
  
  function showFallback() {
    document.getElementById('real-img').style.display = 'none';
    document.getElementById('fallback').style.display = 'flex';
  }
</script>

</body>
</html>
