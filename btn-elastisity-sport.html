<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .btn-hover-effect {
            transition: transform 0.3s ease, filter 0.3s ease;
            cursor: pointer;
            display: block;
        }
        .btn-hover-effect:hover {
            transform: scale(1.05);
            filter: brightness(1.2) drop-shadow(0 0 10px rgba(255, 255, 255, 0.5));
        }
        .btn-hover-effect:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen bg-transparent">

    <!-- Кнопка с изображением -->
    <a href="sim-elastisity-sport.html" class="btn-hover-effect">
        <img 
            src="pic-sim-elastisity-sport.png" 
            alt="Симулятор эластичности спроса" 
            class="w-auto h-auto max-w-full"
            onerror="this.style.display='none'; this.parentElement.innerHTML='Изображение не найдено';"
        >
    </a>

</body>
</html>
</html>
