<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: transparent;
        }

        .simulator-btn {
            display: block;
            transition: transform 0.3s ease, filter 0.3s ease;
            cursor: pointer;
            border: none;
            background: none;
            padding: 0;
            outline: none;
        }

        .simulator-btn:hover {
            transform: scale(1.05);
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.5));
        }

        .simulator-btn img {
            display: block;
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body>

    <a href="sim-elastisity-sport.html" target="_blank" class="simulator-btn">
        <img src="pic-sim-elastisity-sport.png" alt="Запуск симулятора">
    </a>

</body>
</html>
