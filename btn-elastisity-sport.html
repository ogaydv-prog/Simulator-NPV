<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Запуск симулятора</title>
    <style>
        body { 
            background-color: #ffffff; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
        }

        /* Контейнер кнопки */
        .launcher-btn {
            display: inline-block;
            transition: transform 0.3s ease, filter 0.3s ease;
            cursor: pointer;
            border: none;
            background: none;
            padding: 0;
        }

        /* Увеличение и легкая подсветка при наведении */
        .launcher-btn:hover {
            transform: scale(1.05);
            filter: drop-shadow(0 0 10px rgba(0, 0, 0, 0.2));
        }

        /* Эффект нажатия */
        .launcher-btn:active {
            transform: scale(0.98);
        }

        img {
            display: block;
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body>

    <!-- Ссылка-кнопка с визуальными эффектами -->
    <a href="sim-elastisity1.html" class="launcher-btn">
        <img src="pic-sim-elastisity-sport.png" alt="Запустить симуляцию" onerror="this.style.display='none'; this.parentNode.innerHTML='<h2>Симулятор эластичности</h2>'">
    </a>

</body>
</html>
