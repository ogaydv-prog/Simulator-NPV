<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Симулятор Эластичности</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f0f2f5;
            font-family: sans-serif;
        }

        .btn-container {
            text-align: center;
        }

        .btn-link {
            display: inline-block;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 16px;
            padding: 10px;
            background: white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .btn-link:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 20px 30px rgba(0,0,0,0.2);
        }

        .btn-img {
            width: 300px;
            height: auto;
            border-radius: 8px;
            display: block;
        }

        .btn-text {
            margin-top: 15px;
            font-weight: bold;
            color: #333;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <div class="btn-container">
        <a href="sim-elastisity-sport.html" class="btn-link">
            <img src="pic-sim-elastisity-sport.png" 
                 alt="Перейти к симулятору" 
                 class="btn-img"
                 onerror="this.src='https://via.placeholder.com/300x160?text=Симулятор+Эластичности'">
        </a>
    </div>

</body>
</html>
