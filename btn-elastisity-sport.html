<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Запуск симулятора</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Устанавливаем белый фон страницы */
        body { background-color: #ffffff; }
        
        .btn-sim {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            display: block;
            border-radius: 12px;
            overflow: hidden;
            /* Убираем лишние тени, если нужно строгое отображение */
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .btn-sim:hover {
            transform: scale(1.02);
        }
    </style>
</head>
<body class="flex items-center justify-center h-screen">

    <!-- Используем object-contain, чтобы картинка не обрезалась -->
    <div class="btn-sim w-64 h-64 border border-gray-200" onclick="window.location.href='sim-elastisity-sport.html'">
        <img src="pic-sim-elastisity-sport.png" 
             alt="Симулятор" 
             class="w-full h-full object-contain"
             onerror="this.src='https://placehold.co/256x256?text=Нажмите+для+запуска'">
    </div>

</body>
</html>
</html>
