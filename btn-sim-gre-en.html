<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Кнопка Симулятора</title>
    <style>
        /* Убираем любые отступы и полосы прокрутки на уровне документа */
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: transparent;
        }

        /* Центрирование кнопки в ячейке без лишнего пространства */
        .btn-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100vh; /* Занимает ровно пространство фрейма */
            box-sizing: border-box;
        }

        /* Интерактивная ссылка-кнопка */
        .sim-btn {
            display: block;
            width: 100%;
            max-width: 280px; /* Предотвращает чрезмерное растягивание */
            margin: 0 auto;   /* Строгое центрирование слева и справа */
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 12px;
            text-decoration: none;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: all 0.25s ease-in-out;
            box-sizing: border-box;
        }

        /* Контейнер картинки: центрирует и прячет края при увеличении */
        .img-container {
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border-radius: 8px;
            margin-bottom: 8px;
            background-color: #f8fafc;
        }

        /* Картинка: строго по центру с одинаковыми отступами */
        .sim-btn img {
            display: block;
            max-width: 100%;
            height: auto;
            margin: 0 auto;
            transition: transform 0.25s ease-in-out;
        }

        /* Текст под картинкой */
        .sim-btn span {
            display: block;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            font-size: 14px;
            font-weight: 600;
            color: #1e293b;
            margin-top: 4px;
            transition: color 0.25s ease-in-out;
        }

        /* Эффект при наведении (Оживление и Подсветка) */
        .sim-btn:hover {
            transform: translateY(-3px); /* Легкое приподнятие */
            border-color: #10b981;       /* Зеленая рамка (GRE) */
            box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.2); /* Зеленое свечение */
        }

        /* Оживление картинки при наведении */
        .sim-btn:hover img {
            transform: scale(1.04);
        }

        /* Изменение цвета текста при наведении */
        .sim-btn:hover span {
            color: #10b981;
        }
    </style>
</head>
<body>

    <div class="btn-wrapper">
        <a href="sim-antitrust-regulation.html" target="_top" class="sim-btn">
            <div class="img-container">
                <img src="pic-case9.png" alt="Антимонопольное регулирование">
            </div>
            <span>Открыть симулятор</span>
        </a>
    </div>

</body>
</html>
</html>
