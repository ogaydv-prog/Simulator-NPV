<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Полный сброс отступов и скрытие прокрутки */
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background: transparent; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }
        
        /* Ссылочный контейнер с анимацией и центрированием содержимого */
        .btn-link { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            width: 100%; 
            height: 100%; 
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.3s ease; 
            cursor: pointer; 
            text-decoration: none;
            overflow: hidden;
        }
        
        /* Эффект оживления и свечения при наведении */
        .btn-link:hover { 
            transform: scale(1.05); 
            filter: brightness(1.15) drop-shadow(0 0 15px rgba(255, 255, 255, 0.4)); 
        }
        
        /* Эффект нажатия (сжатие) */
        .btn-link:active { 
            transform: scale(0.98); 
        }
        
        /* Идеальное масштабирование и центрирование картинки */
        .btn-img { 
            max-width: 95%; 
            max-height: 95%; 
            object-fit: contain; 
            display: block; 
        }
    </style>
</head>
<body>

    <a href="sim-antitrust-regulation.html" 
       target="_top" 
       class="btn-link">
         <img src="https://raw.githubusercontent.com/ogaydv-prog/Simulator-NPV/main/pic-case9.png" 
              class="btn-img" 
              alt="Симулятор: Государственное регулирование экономики">
    </a>

</body>
</html>
