<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: transparent;
    font-family: 'Segoe UI', Roboto, sans-serif;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .tile-container {
    position: relative;
    width: 220px;
    height: 150px; 
    border-radius: 12px;
    cursor: pointer;
    perspective: 1000px;
  }

  .tile-card {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
  }

  .tile-container.flipped .tile-card {
    transform: rotateY(180deg);
  }

  .front, .back {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    border-radius: 12px;
    box-sizing: border-box;
  }

  .front {
    background: transparent;
  }
  .front img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 12px;
    transition: transform 0.25s ease, filter 0.25s ease;
  }
  .tile-container:not(.flipped):hover .front img {
    transform: scale(1.03);
    filter: drop-shadow(0 5px 15px rgba(0,0,0,0.15)) drop-shadow(0 0 8px rgba(76, 175, 80, 0.4));
  }

  /* Обратная сторона для 6 статей — делаем текст компактнее, чтобы всё влезло без прокрутки! */
  .back {
    background: #ffffff;
    border: 2px solid #2e7d32; /* Зеленый академический контур */
    transform: rotateY(180deg);
    display: flex;
    flex-direction: column;
    justify-content: space-around;
    padding: 4px;
  }

  .back a {
    color: #333333;
    text-decoration: none;
    font-size: 10px;
    font-weight: 700;
    padding: 3px 6px;
    margin: 1px 0;
    border-radius: 4px;
    background: #f5f5f5;
    transition: background 0.2s, color 0.2s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .back a:hover {
    background: #e8f5e9;
    color: #2e7d32;
  }
</style>
</head>
<body>

  <div class="tile-container" id="articlesTile">
    <div class="tile-card">
      <div class="front">
        <img src="pic-articles.png" alt="Материалы для чтения">
      </div>
      <!-- Все 6 ссылок упакованы компактно внутрь плитки -->
      <div class="back">
        <a href="https://forbes.kz/articles/malyy-metr-bolshie-vozmozhnosti-pochemu-investory-v-rk-vybirayut-mikroliving-241765" target="_blank" onclick="event.stopPropagation();">📰 Forbes: Микроливинг РK</a>
        <a href="https://forbes.kz/articles/fermeram-uvelichat-finansirovanie-vesenne-polevyh-iuborochnyh-rabot-fe9f51" target="_blank" onclick="event.stopPropagation();">📰 Forbes: Фермеры РK</a>
        <a href="https://ru.euronews.com/business/2026/05/12/best-performing-european-equities-by-sector-in-2026" target="_blank" onclick="event.stopPropagation();">🇪🇺 Euronews: Equities 2026</a>
        <a href="https://pages.stern.nyu.edu/~adamodar/New_Home_Page/datafile/ctryprem.html" target="_blank" onclick="event.stopPropagation();">📊 Damodaran: Risk Premium</a>
        <a href="https://www.kroll.com/en/tools-and-platforms/cost-of-capital" target="_blank" onclick="event.stopPropagation();">📈 Kroll: Cost of Capital</a>
        <a href="https://atlas.kpmg.com/de/en/deal-advisory-services/cost-of-capital-and-multiples/market-risk-premium-and-risk-free-rate" target="_blank">🌐 KPMG: Market Risk</a>
      </div>
    </div>
  </div>

  <script>
    const tile = document.getElementById('articlesTile');
    tile.addEventListener('click', function() {
      this.classList.toggle('flipped');
    });
  </script>

</body>
</html>
