<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерактивная кнопка-статья</title>
    <style>
        :root {
            --primary-glow: rgba(99, 102, 241, 0.6);
            --bg-menu: #0f172a;
            --text-color: #e2e8f0;
            --border-color: rgba(255, 255, 255, 0.08);
            --hover-item-bg: rgba(255, 255, 255, 0.05);
        }

        html, body {
            margin: 0;
            padding: 0;
            background-color: transparent;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; /* Убираем любые прокрутки внутри фрейма */
        }

        /* Основной контейнер: выстраивает кнопку и список РЯДЫШКОМ по горизонтали */
        .widget-flex-container {
            display: inline-flex;
            align-items: center;
            gap: 16px; /* Зазор между кнопкой и списком ссылок */
            padding: 8px;
        }

        /* Кнопка-ячейка: строго центрована, без надписей */
        .image-btn {
            background: transparent;
            border: none;
            padding: 0;
            cursor: pointer;
            outline: none;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0; /* Кнопка не будет сжиматься */
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), 
                        filter 0.3s ease, 
                        box-shadow 0.3s ease;
            border-radius: 8px;
        }

        /* Картинка: строго повторяет исходный размер */
        .image-btn img {
            display: block;
            max-width: 100%;
            height: auto;
            pointer-events: none;
        }

        /* Эффект оживления при наведении */
        .image-btn:hover {
            transform: scale(1.05);
            filter: brightness(1.15);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .image-btn:active {
            transform: scale(0.98);
        }

        /* Список ссылок: появляется РЯДОМ (справа), не перекрывая низ */
        .links-menu {
            display: none; /* Скрыт по умолчанию */
            background-color: var(--bg-menu);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            padding: 6px 0;
            min-width: 320px;
            opacity: 0;
            transform: translateX(-10px);
            transition: opacity 0.25s ease, transform 0.25s ease;
        }

        /* Полноценное отображение ряда */
        .links-menu.show {
            display: block;
            opacity: 1;
            transform: translateX(0);
        }

        /* Ссылки внутри меню */
        .links-menu a {
            display: block;
            padding: 10px 16px;
            color: var(--text-color);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            line-height: 1.4;
            transition: background-color 0.2s ease, color 0.2s ease;
            border-left: 3px solid transparent;
        }

        .links-menu a:hover {
            background-color: var(--hover-item-bg);
            color: #fff;
            border-left-color: #6366f1;
        }

        .links-menu .divider {
            height: 1px;
            background-color: var(--border-color);
            margin: 4px 0;
        }
    </style>
</head>
<body>

<div class="widget-flex-container">
    <button class="image-btn" id="articlesBtn" title="Просмотреть аналитические материалы">
        <img src="pic-articles6.png" alt="Статьи">
    </button>

    <div class="links-menu" id="articlesMenu">
        <a href="https://kz.kursiv.media/2023-04-07/chto-oznachayut-indeksy/" target="_blank">
            Что означают индексы концентрации рынка?
        </a>
        <div class="divider"></div>
        <a href="https://stat.gov.kz/ru/news/byuro-zapustilo-novyy-instrument-dlya-analiza-konkurentsii-na-rynkakh/" target="_blank">
            Новый инструмент Бюро для анализа конкуренции
        </a>
        <div class="divider"></div>
        <a href="https://www.gov.kz/memleket/entities/zk/documents/details/318123?lang=ru" target="_blank">
            Официальные документы АЗРК РК
        </a>
    </div>
</div>

<script>
    const btn = document.getElementById('articlesBtn');
    const menu = document.getElementById('articlesMenu');

    btn.addEventListener('click', (e) => {
        e.stopPropagation();
        menu.classList.toggle('show');
    });

    document.addEventListener('click', (e) => {
        if (!menu.contains(e.target) && e.target !== btn) {
            menu.classList.remove('show');
        }
    });
</script>

</body>
</html>
