<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерактивная кнопка-статья</title>
    <style>
        :root {
            --primary-glow: rgba(99, 102, 241, 0.6);
            --bg-menu: #0f172a;
            --text-color: #e2e8f0;
            --border-color: rgba(255, 255, 255, 0.08);
            --hover-item-bg: rgba(255, 255, 255, 0.05);
        }

        /* Полная жесткая центровка по двум осям в пределах ячейки/iframe */
        html, body {
            height: 100vh;
            margin: 0;
            padding: 0;
            overflow: hidden; /* Никаких случайных полос прокрутки */
            background-color: transparent;
        }

        body {
            display: grid;
            place-items: center; /* Намертво ставит контейнер в абсолютный центр ячейки */
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* Контейнер виджета с небольшими симметричными зазорами сверху и снизу */
        .widget-container {
            position: relative;
            display: inline-block;
            margin: 8px 0; /* Одинаковые небольшие расстояния сверху и снизу */
        }

        /* Кнопка-ячейка: строго повторяет размеры картинки */
        .image-btn {
            background: transparent;
            border: none;
            padding: 0;
            cursor: pointer;
            outline: none;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), 
                        filter 0.3s ease, 
                        box-shadow 0.3s ease;
            border-radius: 8px;
        }

        /* Картинка без искажений и надписей */
        .image-btn img {
            display: block;
            max-width: 100%;
            height: auto;
            pointer-events: none;
        }

        /* Эффект оживления и подсветки при наведении */
        .image-btn:hover {
            transform: scale(1.05);
            filter: brightness(1.15);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .image-btn:active {
            transform: scale(0.98);
        }

        /* Выпадающий список (центрирован строго под кнопкой) */
        .links-menu {
            display: none;
            position: absolute;
            top: calc(100% + 6px);
            left: 50%;
            transform: translateX(-50%) translateY(-8px);
            background-color: var(--bg-menu);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            min-width: 280px;
            z-index: 999;
            padding: 6px 0;
            opacity: 0;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        .links-menu.show {
            display: block;
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Ссылки внутри меню */
        .links-menu a {
            display: block;
            padding: 10px 16px;
            color: var(--text-color);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            line-height: 1.4;
            transition: background-color 0.2s ease, color 0.2s ease;
            border-left: 3px solid transparent;
            white-space: nowrap;
        }

        .links-menu a:hover {
            background-color: var(--hover-item-bg);
            color: #fff;
            border-left-color: #6366f1;
        }

        .links-menu .divider {
            height: 1px;
            background-color: var(--border-color);
            margin: 4px 0;
        }
    </style>
</head>
<body>

<div class="widget-container">
    <button class="image-btn" id="articlesBtn" title="Типы конкуренции">
        <img src="pic-articles6.png" alt="Типы конкуренции">
    </button>

    <div class="links-menu" id="articlesMenu">
        <a href="https://kz.kursiv.media/2023-04-07/chto-oznachayut-indeksy/" target="_blank">
            What do market concentration indices mean?
        </a>
        <div class="divider"></div>
        <a href="https://stat.gov.kz/ru/news/byuro-zapustilo-novyy-instrument-dlya-analiza-konkurentsii-na-rynkakh/" target="_blank">
            New Bureau tool for market competition analysis
        </a>
        <div class="divider"></div>
        <a href="https://www.gov.kz/memleket/entities/zk/documents/details/318123?lang=ru" target="_blank">
            Official AZRK RK Documents
        </a>
    </div>
</div>

<script>
    const btn = document.getElementById('articlesBtn');
    const menu = document.getElementById('articlesMenu');

    btn.addEventListener('click', (e) => {
        e.stopPropagation();
        menu.classList.toggle('show');
    });

    document.addEventListener('click', (e) => {
        if (!menu.contains(e.target) && e.target !== btn) {
            menu.classList.remove('show');
        }
    });
</script>

</body>
</html>
