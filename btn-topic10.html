<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            background: transparent; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }
        
        .btn-link { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            width: 100%; 
            height: 100%; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer; 
            text-decoration: none;
            border-radius: 12px;
            overflow: hidden;
        }
        
        /* Эффект подсветки и оживления при наведении */
        .btn-link:hover { 
            transform: translateY(-5px) scale(1.02); 
            filter: brightness(1.2) drop-shadow(0 10px 20px rgba(0, 0, 0, 0.4)); 
        }
        
        .btn-link:active { 
            transform: translateY(0) scale(0.98); 
        }
        
        .btn-img { 
            max-width: 90%; 
            max-height: 90%; 
            object-fit: contain; 
            transition: transform 0.4s ease;
        }
    </style>
</head>
<body>

    <!-- Ссылка на страницу Google Sites -->
    <a href="https://sites.google.com/view/managerial-economics-mba/%D0%B7%D0%B0%D0%BD%D1%8F%D1%82%D0%B8%D1%8F/%D1%81%D1%82%D1%80%D0%B0%D1%82%D0%B5%D0%B3%D0%B8%D0%B8-%D0%B8-%D0%B1%D0%B0%D1%80%D1%8C%D0%B5%D1%80%D1%8B-%D0%B2%D1%85%D0%BE%D0%B4%D0%B0-%D0%BD%D0%B0-%D1%80%D1%8B%D0%BD%D0%BE%D0%BA" 
       target="_blank" 
       rel="noopener noreferrer"
       class="btn-link">
        <!-- Картинка pic-topic10.png из репозитория Simulator-NPV -->
        <img src="https://raw.githubusercontent.com/ogaydv-prog/Simulator-NPV/main/pic-topic10.png" 
             class="btn-img" 
             alt="Стратегии и барьеры входа на рынок">
    </a>

</body>
</html>
