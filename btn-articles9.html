<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>btn-articles9</title>
<style>
  body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  /* 3D Контейнер */
  .flip-card {
    background-color: transparent;
    width: 250px;
    height: 250px;
    perspective: 1000px;
    cursor: pointer;
  }

  .flip-card-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    transform-style: preserve-3d;
  }

  /* Переворот */
  .flip-card.flipped .flip-card-inner {
    transform: rotateY(180deg);
  }

  .flip-card-front, .flip-card-back {
    position: absolute;
    width: 100%;
    height: 100%;
    -webkit-backface-visibility: hidden;
    backface-visibility: hidden;
    border-radius: 12px;
    overflow: hidden;
    box-sizing: border-box;
  }

  /* ЛИЦЕВАЯ СТОРОНА: Только чистая картинка, идеально отцентрованная */
  .flip-card-front {
    background-color: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.25s ease, filter 0.25s ease;
  }

  /* Эффект подсветки и оживления только при наведении на лицевую сторону */
  .flip-card:not(.flipped):hover .flip-card-front {
    transform: scale(1.04);
    filter: drop-shadow(0 0 12px rgba(13, 148, 136, 0.6));
  }

  .tile-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* ОБРАТНАЯ СТОРОНА: Только список ссылок */
  .flip-card-back {
    background-color: #0f172a;
    transform: rotateY(180deg);
    border: 2px solid rgba(13, 148, 136, 0.7);
    padding: 12px;
    display: flex;
    flex-direction: column;
    justify-content: center; /* Центрируем список по вертикали */
    gap: 8px;
  }

  .article-link {
    display: block;
    background: rgba(255, 255, 255, 0.04);
    color: #e2e8f0;
    text-decoration: none;
    padding: 12px 14px;
    border-radius: 8px;
    font-size: 11px;
    font-family: 'Segoe UI', Arial, sans-serif;
    line-height: 1.4;
    text-align: left;
    border: 1px solid rgba(255, 255, 255, 0.06);
    transition: all 0.2s ease;
  }

  .article-link:hover {
    background: rgba(13, 148, 136, 0.2);
    border-color: #14b8a6;
    color: #ffffff;
    transform: translateX(4px);
  }
</style>
</head>
<body>

<div class="flip-card" id="card">
  <div class="flip-card-inner">
    
    <!-- Лицевая сторона: Только картинка-кнопка -->
    <div class="flip-card-front">
      <img src="https://raw.githubusercontent.com/ogaydv-prog/Simulator-NPV/main/pic-articles9.png" class="tile-img" alt="Статьи 9">
    </div>

    <!-- Обратная сторона: Только список из статей -->
    <div class="flip-card-back">
      <a href="https://www.breakfreefromplastic.org/ru/2025/06/23/what-is-sachet-economy/" target="_blank" class="article-link">
        1. Саше-экономика: вызовы и риски
      </a>
      <a href="https://tengrinews.kz/article/kazaxstan-ne-alkogolnaia-strana-kulturolog-logike-trezvogo-4021/" target="_blank" class="article-link">
        2. Культура трезвого образа жизни
      </a>
      <a href="https://ru.euronews.com/2023/03/28/the-worlds-richest-country-made-public-transport-free-heres-what-happened-next" target="_blank" class="article-link">
        3. Бесплатный транспорт Люксембурга
      </a>
    </div>

  </div>
</div>

<script>
  const card = document.getElementById('card');

  card.addEventListener('click', function(e) {
    // Если кликнули по ссылке, карту не переворачиваем назад
    if (e.target.tagName === 'A') return;
    
    // В остальных случаях переключаем переворот туда-обратно
    card.classList.toggle('flipped');
  });
</script>

</body>
</html>
