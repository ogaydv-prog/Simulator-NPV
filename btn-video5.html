<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кнопка Видео: Типы конкуренции</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html, body {
            margin: 0 !important;
            padding: 0 !important;
            height: 100%;
            background: transparent;
            overflow: hidden; /* Исключаем любые скроллбары */
        }
        
        /* Контейнер для идеального выравнивания по центру фрейма */
        .flex-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
            box-sizing: border-box;
        }

        /* Эффект оживания кнопки без изменения её физических границ */
        .interactive-btn {
            display: block;
            margin: 0 auto !important;
            padding: 0 !important;
            border: none !important;
            background: transparent !important;
            outline: none !important;
            transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1), filter 0.25s ease;
            cursor: pointer;
        }
        
        .interactive-btn:hover {
            transform: scale(1.05);
            filter: drop-shadow(0 0 8px rgba(59, 130, 246, 0.6));
        }

        .interactive-btn img {
            display: block; /* Убирает дефолтный нижний отступ инлайновых элементов */
            max-width: 100%;
            height: auto;
            margin: 0 !important;
            padding: 0 !important;
        }

        /* Кастомный скролл для меню */
        .custom-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.6);
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #3b82f6;
            border-radius: 2px;
        }
    </style>
</head>
<body>

    <div class="flex-container">
        <!-- Ограничитель относительного позиционирования для меню -->
        <div class="relative inline-block">
            
            <button id="main-btn" onclick="toggleMenu()" class="interactive-btn">
                <img src="pic-video5.png" alt="Видео материалы">
            </button>

            <!-- Выпадающий список ссылок -->
            <div id="video-menu" class="hidden absolute top-full left-1/2 -translate-x-1/2 mt-2 w-72 bg-slate-950/95 border border-blue-500/30 rounded-xl shadow-2xl p-3 z-50 backdrop-blur-md">
                <div class="text-[10px] uppercase font-black text-blue-400 tracking-widest mb-2 text-left px-2 border-b border-slate-800 pb-1">
                    Типы конкуренции: Видео
                </div>
                <ul class="space-y-1.5 text-left text-xs custom-scroll max-h-60 overflow-y-auto">
                    <li>
                        <a href="https://www.youtube.com/watch?v=NySt2EDS1Ik" target="_blank" class="flex items-center gap-2 p-2 rounded-lg text-slate-300 hover:text-white hover:bg-blue-600/20 border border-transparent hover:border-blue-500/20 transition-all">
                            <span class="text-blue-500 font-bold">▶</span> Часть 1: Совершенная конкуренция
                        </a>
                    </li>
                    <li>
                        <a href="https://www.youtube.com/watch?v=cdkE_TgDMM4" target="_blank" class="flex items-center gap-2 p-2 rounded-lg text-slate-300 hover:text-white hover:bg-blue-600/20 border border-transparent hover:border-blue-500/20 transition-all">
                            <span class="text-blue-500 font-bold">▶</span> Часть 2: Монополистическая
                        </a>
                    </li>
                    <li>
                        <a href="https://www.youtube.com/watch?v=t9LIn6kKHw0" target="_blank" class="flex items-center gap-2 p-2 rounded-lg text-slate-300 hover:text-white hover:bg-blue-600/20 border border-transparent hover:border-blue-500/20 transition-all">
                            <span class="text-blue-500 font-bold">▶</span> Часть 3: Олигополия (Модели)
                        </a>
                    </li>
                    <li>
                        <a href="https://www.youtube.com/watch?v=A0lUZ_-ZkI0" target="_blank" class="flex items-center gap-2 p-2 rounded-lg text-slate-300 hover:text-white hover:bg-blue-600/20 border border-transparent hover:border-blue-500/20 transition-all">
                            <span class="text-blue-500 font-bold">▶</span> Часть 4: Чистая монополия
                        </a>
                    </li>
                    <li>
                        <a href="https://www.youtube.com/watch?v=0QIDLnTfnpY" target="_blank" class="flex items-center gap-2 p-2 rounded-lg text-slate-300 hover:text-white hover:bg-blue-600/20 border border-transparent hover:border-blue-500/20 transition-all">
                            <span class="text-blue-500 font-bold">▶</span> Часть 5: Практические кейсы
                        </a>
                    </li>
                </ul>
            </div>

        </div>
    </div>

    <script>
        function toggleMenu() {
            const menu = document.getElementById('video-menu');
            menu.classList.toggle('hidden');
        }

        // Закрытие меню при клике в любом месте за его пределами
        document.addEventListener('click', function(event) {
            const menu = document.getElementById('video-menu');
            const btn = document.getElementById('main-btn');
            if (!btn.contains(event.target) && !menu.contains(event.target)) {
                menu.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
