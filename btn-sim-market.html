<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { 
            margin: 0; padding: 0; overflow: hidden; 
            display: flex; justify-content: center; align-items: center; 
            background: transparent;
        }
        /* Ссылка, которая открывает симулятор в НОВОЙ вкладке */
        .btn-link { 
            display: block; transition: transform 0.3s ease, filter 0.3s ease; 
            cursor: pointer; line-height: 0; width: 100%;
        }
        .btn-link:hover { 
            transform: scale(1.05); 
            filter: brightness(1.2) drop-shadow(0 0 10px rgba(255, 255, 255, 0.3)); 
        }
        .btn-img { display: block; width: 100%; height: auto; }
    </style>
</head>
<body>
    <!-- target="_blank" — вот ключ к открытию в новом окне -->
    <!-- Ссылка указывает СТРОГО на sim-perfect-competition.html -->
    <a href="sim-perfect-competition.html" target="_blank" class="btn-link">
        <img src="https://raw.githubusercontent.com/ogaydv-prog/Simulator-NPV/main/pic-sim-market.png" 
             alt="Симулятор совершенной конкуренции" class="btn-img">
    </a>
</body>
</html>
