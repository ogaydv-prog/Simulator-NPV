<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Убираем все отступы и центрирование, которые двигали кнопку */
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
        }
        .btn-link { 
            display: block; 
            width: 100%; 
            height: 100%; 
            transition: transform 0.2s ease; 
        }
        .btn-link:hover { 
            transform: scale(1.02); 
        }
        /* Растягиваем картинку на весь размер фрейма */
        .btn-img { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; /* Чтобы картинка не обрезалась, а масштабировалась целиком */
            display: block; 
        }
    </style>
</head>
<body>
    <a href="sim-perfect-competition.html" target="_blank" class="btn-link">
        <img src="https://raw.githubusercontent.com/ogaydv-prog/Simulator-NPV/main/pic-sim-market.png" 
             alt="Симулятор совершенной конкуренции" class="btn-img">
    </a>
</body>
</html>
