<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Идеальное центрирование и сброс отступов под фрейм */
        html, body { 
            margin: 0; 
            padding: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background: transparent; 
            overflow: hidden; 
        }
        
        .btn-link { 
            display: block; 
            width: 100%; 
            height: 100%;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.3s ease; 
            cursor: pointer; 
            text-decoration: none;
        }
        
        /* Эффект оживления: плавное увеличение, повышение яркости и мягкое неоновое свечение */
        .btn-link:hover { 
            transform: scale(1.05); 
            filter: brightness(1.15) drop-shadow(0 0 15px rgba(255, 255, 255, 0.3)); 
        }
        
        /* Эффект нажатия (сжатие кнопки до 0.98) */
        .btn-link:active { 
            transform: scale(0.98); 
        }
        
        /* Адаптивное масштабирование картинки без деформаций */
        .btn-img { 
            display: block; 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
        }
    </style>
</head>
<body>

    <!-- Ссылка на симулятор задач (откроется в новой вкладке) -->
    <a href="sim-game-theory-tasks.html" 
       target="_blank" 
       rel="noopener noreferrer"
       class="btn-link">
        <!-- Картинка задач из вашего репозитория Simulator-NPV -->
        <img src="https://raw.githubusercontent.com/ogaydv-prog/Simulator-NPV/main/pic-task8.png" 
             class="btn-img" 
             alt="Открыть задачи по теории игр">
    </a>

</body>
</html>
