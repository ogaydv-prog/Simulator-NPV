<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Идеальное центрирование и сброс отступов под фрейм */
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background: transparent; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }
        
        .btn-link { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            width: 100%; 
            height: 100%; 
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.3s ease; 
            cursor: pointer; 
            text-decoration: none;
            overflow: hidden;
        }
        
        /* Эффект оживления: плавное увеличение, повышение яркости и мягкое неоновое свечение */
        .btn-link:hover { 
            transform: scale(1.05); 
            filter: brightness(1.15) drop-shadow(0 0 15px rgba(255, 255, 255, 0.4)); 
        }
        
        /* Эффект нажатия (сжатие кнопки) */
        .btn-link:active { 
            transform: scale(0.98); 
        }
        
        /* Ограничение размера до 95% для создания безопасных полей при наведении */
        .btn-img { 
            max-width: 95%; 
            max-height: 95%; 
            object-fit: contain; 
            display: block; 
        }
    </style>
</head>
<body>

    <!-- Ссылка на файл Google Docs (Конспект Лекции 10) -->
    <a href="https://docs.google.com/document/d/1JNlb4gyhhqC4vsW71YzW8qFVeUdH3fxV/edit?usp=sharing&ouid=109725301150629205728&rtpof=true&sd=true" 
       target="_blank" 
       rel="noopener noreferrer"
       class="btn-link">
        <!-- Картинка pic-lecture10.png из вашего репозитория Simulator-NPV -->
        <img src="https://raw.githubusercontent.com/ogaydv-prog/Simulator-NPV/main/pic-lecture10.png" 
             class="btn-img" 
             alt="Конспект Лекции 10: Стратегии и барьеры входа на рынок">
    </a>

</body>
</html>
